<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H5Y</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stage">
  <div id="wrap">
    <svg id="S" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div id="ui">

    <div id="top-row">
      <div id="countdown">
        <div id="countdown-label">until habitat 5 years festival</div>
        <div id="countdown-units">
          <div class="c-unit"><div class="c-num" id="cd-d">--</div><div class="c-lab" data-key="days">days</div></div>
          <div class="c-sep">:</div>
          <div class="c-unit"><div class="c-num" id="cd-h">--</div><div class="c-lab" data-key="hours">hours</div></div>
          <div class="c-sep">:</div>
          <div class="c-unit"><div class="c-num" id="cd-m">--</div><div class="c-lab" data-key="mins">min</div></div>
          <div class="c-sep">:</div>
          <div class="c-unit"><div class="c-num" id="cd-s">--</div><div class="c-lab" data-key="secs">sec</div></div>
        </div>
      </div>
      <div id="lang">
        <span class="active" data-l="en">EN</span>
        <span data-l="it">IT</span>
      </div>
    </div>

    <div></div>

    <div id="buttons">
      <a class="btn-h5" href="ticket/" data-key="tickets">book</a>
      <a class="btn-h5" href="program/" data-key="program">program</a>
      <a class="btn-h5" href="#" onclick="downloadIcs();return false;" data-key="cal">save to calendar</a>

    </div>

  </div>
</div>

<script src="obj_svg.js"></script>
<script>
  const SEEN_KEY = 'habitat_h5_seen';
  const alreadySeen = localStorage.getItem(SEEN_KEY) === '1';

  /* i18n */
  const i18n = {
    en: { 'countdown-label': 'until habitat 5 years festival', days: 'days', hours: 'hours', mins: 'min', secs: 'sec', cal: 'save to calendar', tickets: 'book', program: 'program' },
    it:  { 'countdown-label': 'ai 5 anni di habitat',   days: 'giorni', hours: 'ore', mins: 'min', secs: 'sec', cal: 'salva in calendario', tickets: 'prenota', program: 'programma' }
  };
  let lang = 'en';
  function setLang(l) {
    lang = l;
    document.querySelectorAll('#lang span').forEach(s => s.classList.toggle('active', s.dataset.l === l));
    const t = i18n[l];
    document.getElementById('countdown-label').textContent = t['countdown-label'];
    document.querySelectorAll('[data-key]').forEach(el => { if (t[el.dataset.key]) el.textContent = t[el.dataset.key]; });
  }
  document.querySelectorAll('#lang span').forEach(s => s.addEventListener('click', () => setLang(s.dataset.l)));

  /* countdown */
  const target = new Date('2026-07-17T11:00:00+02:00').getTime();
  function pad(n) { return String(n).padStart(2, '0'); }
  function tickCountdown() {
    const diff = Math.max(0, target - Date.now());
    document.getElementById('cd-d').textContent = Math.floor(diff / 86400000);
    document.getElementById('cd-h').textContent = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('cd-m').textContent = pad(Math.floor((diff % 3600000) / 60000));
    document.getElementById('cd-s').textContent = pad(Math.floor((diff % 60000) / 1000));
  }
  function startUI() {
    document.getElementById('ui').classList.add('visible');
    tickCountdown();
    setInterval(tickCountdown, 1000);
    localStorage.setItem(SEEN_KEY, '1');
  }


 function downloadIcs() {
            const ics = [
            'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Habitat//Festival 2026//EN',
            'CALSCALE:GREGORIAN','METHOD:PUBLISH','BEGIN:VEVENT',
            'DTSTART;TZID=Europe/Rome:20260717T110000',
            'DTEND;TZID=Europe/Rome:20260719T235900',
            'SUMMARY:Habitat Festival 2026',
            'DESCRIPTION:Habitat Festival 2026 — Cà de Monti\\, Tredozio',
            'LOCATION:Cà de Monti\\, Tredozio (FC)\\, Italy',
            'URL:https://5years.habitattt.it/',
            'END:VEVENT','END:VCALENDAR'
            ].join('\r\n');
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([ics], { type: 'text/calendar;charset=utf-8' }));
            a.download = 'habitat-festival-2026.ics';
            a.click();
        }

  /* SVG */
  const NS = 'http://www.w3.org/2000/svg';
  const S = document.getElementById('S');

  const tmp = document.createElementNS(NS, 'svg');
  tmp.setAttribute('viewBox', '0 0 1080 1080');
  tmp.style.cssText = 'position:fixed;visibility:hidden;top:-9999px;width:1080px;height:1080px';
  document.body.appendChild(tmp);
  const all = [...HP.map(d => ({ d, g: '5' })), ...FP.map(d => ({ d, g: 'H' }))].map(it => {
    const p = document.createElementNS(NS, 'path'); p.setAttribute('d', it.d);
    tmp.appendChild(p); const bb = p.getBBox(); tmp.removeChild(p);
    return { ...it, bb };
  });
  document.body.removeChild(tmp);

  const nodes = all.map(it => {
    const g = document.createElementNS(NS, 'g');
    const p = document.createElementNS(NS, 'path');
    p.setAttribute('d', it.d); p.setAttribute('class', 'dp');
    g.appendChild(p); S.appendChild(g);
    return { g, it, tx: 0, ty: 0 };
  });

  function borderPos(i, total) {
    const side = i % 4, t = (Math.floor(i / 4)) / Math.ceil(total / 4), s = 900, m = 60;
    if (side === 0) return { x: m + Math.random() * 160 - 80, y: m + t * s };
    if (side === 1) return { x: 920 + Math.random() * 80, y: m + t * s };
    if (side === 2) return { x: m + t * s, y: m + Math.random() * 120 };
    return { x: m + t * s, y: 920 + Math.random() * 80 };
  }
  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }

  function assembleGroup(group, done) {
    const mine = nodes.filter(n => n.it.g === group);
    const other = shuffle(nodes.filter(n => n.it.g !== group).slice());
    other.forEach(({ g }, i) => {
      const pos = borderPos(i, other.length), bx = pos.x - 540, by = pos.y - 540;
      const ni = nodes.findIndex(x => x.g === g);
      nodes[ni].tx = bx; nodes[ni].ty = by;
      g.style.transition = 'transform .32s cubic-bezier(.4,0,.2,1),opacity .22s';
      g.style.opacity = '.2';
      g.setAttribute('transform', `translate(${bx},${by})`);
    });
    mine.forEach(({ g }, i) => {
      const ni = nodes.findIndex(x => x.g === g);
      setTimeout(() => {
        nodes[ni].tx = 0; nodes[ni].ty = 0;
        g.style.transition = 'transform .36s cubic-bezier(.22,.68,0,1.15),opacity .25s';
        g.style.opacity = '1';
        g.setAttribute('transform', 'translate(0,0)');
      }, i * 15);
    });
    if (done) setTimeout(done, mine.length * 15 + 380);
  }

  function explodeAll(done) {
    nodes.forEach(({ g }, i) => {
      const a = Math.random() * Math.PI * 2, r = 180 + Math.random() * 380;
      nodes[i].tx = Math.cos(a) * r; nodes[i].ty = Math.sin(a) * r;
      g.style.transition = 'transform .32s cubic-bezier(.4,0,.2,1),opacity .22s';
      g.style.opacity = '1';
      g.setAttribute('transform', `translate(${nodes[i].tx},${nodes[i].ty})`);
    });
    if (done) setTimeout(done, 480);
  }

  function intro(done) {
    nodes.forEach(({ g }, i) => {
      const a = (i / nodes.length) * Math.PI * 2, r = 600 + Math.random() * 150;
      nodes[i].tx = Math.cos(a) * r; nodes[i].ty = Math.sin(a) * r;
      g.style.transition = 'none'; g.style.opacity = '0';
      g.setAttribute('transform', `translate(${nodes[i].tx},${nodes[i].ty})`);
    });
    setTimeout(() => {
      nodes.forEach(({ g }) => { g.style.transition = 'opacity .2s'; g.style.opacity = '.15'; });
      setTimeout(done, 300);
    }, 80);
  }

  /* start */
  if (alreadySeen) {
    /* UI subito visibile, animazione gira comunque */
    startUI();
    setTimeout(() => {
      intro(() => {
        assembleGroup('H', () => {
          setTimeout(() => {
            explodeAll(() => {
              setTimeout(() => {
                assembleGroup('5');
              }, 300);
            });
          }, 1600);
        });
      });
    }, 300);
  } else {
    /* prima visita: UI appare solo alla fine */
    setTimeout(() => {
      intro(() => {
        assembleGroup('H', () => {
          setTimeout(() => {
            explodeAll(() => {
              setTimeout(() => {
                assembleGroup('5', () => {
                  setTimeout(startUI, 450);
                });
              }, 300);
            });
          }, 1600);
        });
      });
    }, 300);
  }
</script>
</body>
</html>
