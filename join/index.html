<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesseramento - Habitat / Distretto A</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #f4f4f4;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border: 2px solid #000;
            box-shadow: 10px 10px 0px #000;
            max-width: 750px;
            width: 100%;
            margin: 0px 0;
            transform: scale(0.95);
            transform-origin: top center;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logos-container {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            padding-left: 2%;
            filter: brightness(0.5);
        }

        .lang-toggle {
            display: flex;
            border: 2px solid #000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75em;
            font-weight: bold;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .lang-toggle button {
            padding: 4px 8px;
            border: none;
            background: white;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: inherit;
        }

        .lang-toggle button.active {
            background: #000;
            color: #fff;
        }

        h1 {
            border-bottom: 4px solid #000;
            padding-bottom: 10px;
            margin-top: 0;
            text-transform: uppercase;
            font-size: 2em;
        }

        h2 {
            font-size: 1em;
            text-transform: uppercase;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 5px 10px;
            margin-top: 30px;
            margin-bottom: 5px;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: bold;
            font-size: 0.85em;
            text-transform: uppercase;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 2px solid #000;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 0;
        }

        .help-text {
            font-size: 0.75em;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .checkbox-group {
            margin-top: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .checkbox-group input {
            width: auto;
            margin: 0;
            transform: scale(1.2);
        }

        .payment-box {
            background: #f9f9f9;
            padding: 15px;
            border: 1px dashed #000;
            margin-top: 10px;
            font-size: 0.85em;
        }

        .btn-send {
            background: black;
            color: white;
            padding: 20px;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 40px;
            font-weight: bold;
            font-size: 1.2em;
            text-transform: uppercase;
        }

        .error-banner {
            background: #ff0000;
            color: #fff;
            padding: 15px;
            border: 2px solid #000;
            margin-bottom: 20px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }

            .card {
                padding: 20px;
            }

            .card-header {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }

            .logos-container {
                padding-left: 0;
                gap: 15px;
            }

            .logos-container img {
                height: 6vh;
            }

            h1 {
                font-size: 1.3em;
                text-align: center;
            }

            .lang-toggle {
                margin-left: 0;
            }
        }
    </style>
</head>

<body x-data="membershipForm" x-cloak>

    <div class="card">
        <template x-if="!submitted">
            <div>
                <div class="card-header">
                    <div class="logos-container">
                        <img src="https://habitattt.it/images/h.logo.png" alt="Habitat"
                            style="height:10vh;flex-shrink:0;">
                        <img src="https://www.distrettoa.it/wp-content/uploads/2018/09/cropped-Distretto-A_logo-300px-290x290.png"
                            alt="Distretto A" style="height:10vh;flex-shrink:0;">
                    </div>
                    <h1 x-text="lang === 'it' ? 'DOMANDA DI ISCRIZIONE' : 'MEMBERSHIP APPLICATION'"></h1>
                    <div class="lang-toggle">
                        <button @click="lang = 'it'" :class="lang === 'it' && 'active'">IT</button>
                        <button @click="lang = 'en'" :class="lang === 'en' && 'active'">EN</button>
                    </div>
                </div>
                <p>
                    <span x-text="lang === 'it' ? 'Quota associativa annuale:' : 'Annual membership fee:'"></span>
                    <b>&euro; 10,00</b>
                </p>

                <p>
                    <a href="./statuto_2021.pdf" target="_blank" x-text="lang === 'it' ? 'Leggi lo statuto' : 'Read the articles of association (italian)'"></a>
                </p>

                <template x-if="errorMessage">
                    <div class="error-banner" x-text="errorMessage"></div>
                </template>

                <h2 x-text="lang === 'it' ? '1. ANAGRAFICA' : '1. PERSONAL INFO'"></h2>
                <label>Email *</label><input type="email" x-model="form.email">
                <div class="grid">
                    <div>
                        <label x-text="lang === 'it' ? 'Cognome *' : 'Surname *'"></label>
                        <input type="text" x-model="form.cognome">
                    </div>
                    <div>
                        <label x-text="lang === 'it' ? 'Nome *' : 'Name *'"></label>
                        <input type="text" x-model="form.nome">
                    </div>
                </div>
                <label x-text="lang === 'it' ? 'Data di nascita *' : 'Date of birth *'"></label>
                <input type="date" x-model="form.dataNascita">
                <div class="grid">
                    <div>
                        <label x-text="lang === 'it' ? 'Città di nascita *' : 'City of birth *'"></label>
                        <input type="text" x-model="form.luogoNascita">
                    </div>
                    <div>
                        <label x-text="lang === 'it' ? 'Prov. *' : 'Province *'"></label>
                        <input type="text" x-model="form.provNascita" maxlength="2">
                    </div>
                </div>
                <label x-text="lang === 'it' ? 'Paese di nascita *' : 'Country of birth *'"></label>
                <input type="text" x-model="form.paeseNascita">

                <div x-show="lang === 'it'">
                    <label>Cod. Fiscale / VAT Number *</label>
                    <input type="text" x-model="form.codiceFiscale" style="text-transform:uppercase">
                </div>

                <h2 x-text="lang === 'it' ? '2. RESIDENZA & RECAPITI' : '2. ADDRESS & CONTACTS'"></h2>
                <label x-text="lang === 'it' ? 'Indirizzo *' : 'Address *'"></label>
                <input type="text" x-model="form.indirizzo">
                <div class="grid">
                    <div>
                        <label x-text="lang === 'it' ? 'CAP *' : 'ZIP Code *'"></label>
                        <input type="text" x-model="form.cap">
                    </div>
                    <div>
                        <label x-text="lang === 'it' ? 'Città *' : 'City *'"></label>
                        <input type="text" x-model="form.cittaResidenza">
                    </div>
                </div>
                <div class="grid">
                    <div>
                        <label x-text="lang === 'it' ? 'Prov. *' : 'Province *'"></label>
                        <input type="text" x-model="form.provResidenza" maxlength="2">
                    </div>
                    <div>
                        <label x-text="lang === 'it' ? 'Paese *' : 'Country *'"></label>
                        <input type="text" x-model="form.paeseResidenza">
                    </div>
                </div>
                <label x-text="lang === 'it' ? 'Cellulare / Tel. *' : 'Phone *'"></label>
                <input type="text" x-model="form.telefono">

                <div x-show="!isFestival">
                    <h2 x-text="lang === 'it' ? '3. INTERESSI' : '3. INTERESTS'"></h2>
                    <label x-text="lang === 'it' ? 'Sono interessato/a a... *' : 'I\'m interested in... *'"></label>
                    <template x-for="opt in interessiOpts">
                        <label class="checkbox-group">
                            <input type="radio" name="interesse" :value="opt" x-model="form.interesse"> <span
                                x-text="opt"></span>
                        </label>
                    </template>
                </div>

                <div x-show="!isArtist">
                    <h2 x-text="lang === 'it' ? '4. PAGAMENTO' : '4. PAYMENT'"></h2>
                    <label x-text="lang === 'it' ? 'Metodo di pagamento *' : 'Payment method *'"></label>

                    <select x-model="form.metodoPagamento">
                        <option value=""
                            x-text="!form.interesse
                                ? (lang === 'it' ? 'Seleziona prima un interesse (sezione 3)' : 'Select an interest first (section 3)')
                                : (lang === 'it' ? 'Scegli...' : 'Choose...')"></option>
                        <template x-if="form.interesse === 'Habitat - Cà De Monti'">
                            <option value="CashHabitat">HABITAT >> CONTANTI / CASH</option>
                        </template>
                        <template x-if="form.interesse === 'Habitat - Cà De Monti'">
                            <option value="HabitatPaypal">HABITAT >> PAYPAL / APPLE PAY / CARD</option>
                        </template>
                        <template x-if="form.interesse === 'Habitat - Cà De Monti'">
                            <option value="HabitatIban">HABITAT >> IBAN</option>
                        </template>
                        <template x-if="form.interesse === 'Distretto A' || form.interesse === 'Quazar - Coworking'">
                            <option value="CashDistrettoA">DISTRETTO A >> CONTANTI / CASH</option>
                        </template>
                        <template x-if="form.interesse === 'Distretto A' || form.interesse === 'Quazar - Coworking'">
                            <option value="DistrettoPaypal">DISTRETTO A >> PAYPAL</option>
                        </template>
                        <template x-if="form.interesse === 'Distretto A' || form.interesse === 'Quazar - Coworking'">
                            <option value="DistrettoIban">DISTRETTO A >> IBAN</option>
                        </template>
                    </select>

                    <label x-text="lang === 'it' ? `(Riceverai le istruzioni di pagamento dopo l'invio della domanda)` : `(You will receive payment instructions after submitting your application)`"></label>
                </div>

                <div x-show="isFestival" style="margin-top:30px; padding-top:20px; border-top:2px solid #000;">
                    <h2>5. FESTIVAL</h2>

                    <label class="checkbox-group">
                        <input type="checkbox" x-model="form.festivalAllergy">
                        <span x-text="lang === 'it' ? 'Ho intolleranze o allergie alimentari' : 'I have food intolerances or allergies'"></span>
                    </label>

                    <div x-show="form.festivalAllergy" style="margin-top:10px;">
                        <label x-text="lang === 'it' ? 'Note intolleranze/allergie' : 'Intolerance/allergy notes'"></label>
                        <textarea x-model="form.festivalAllergyNotes" rows="3"></textarea>
                    </div>

                    <div style="margin-top:15px;">
                        <label x-text="lang === 'it' ? 'Giorno di arrivo previsto' : 'Expected arrival day'"></label>
                        <select x-model="form.festivalCheckinDay">
                            <option value="" x-text="lang === 'it' ? '— Seleziona giorno —' : '— Select day —'"></option>
                            <template x-if="isArtist">
                                <option value="lunedi" x-text="lang === 'it' ? 'Lunedì' : 'Monday'"></option>
                            </template>
                            <template x-if="isArtist">
                                <option value="martedi" x-text="lang === 'it' ? 'Martedì' : 'Tuesday'"></option>
                            </template>
                            <template x-if="isArtist">
                                <option value="mercoledi" x-text="lang === 'it' ? 'Mercoledì' : 'Wednesday'"></option>
                            </template>
                            <template x-if="isArtist">
                                <option value="giovedi" x-text="lang === 'it' ? 'Giovedì' : 'Thursday'"></option>
                            </template>
                            <option value="venerdi" x-text="lang === 'it' ? 'Venerdì' : 'Friday'"></option>
                            <option value="sabato" x-text="lang === 'it' ? 'Sabato' : 'Saturday'"></option>
                            <option value="domenica" x-text="lang === 'it' ? 'Domenica' : 'Sunday'"></option>
                        </select>
                    </div>

                    <div style="margin-top:15px;">
                        <label x-text="lang === 'it' ? 'Orario di arrivo previsto' : 'Expected arrival time'"></label>
                        <input type="time" x-model="form.festivalCheckinTime">
                    </div>
                </div>

                <h2 x-text="lang === 'it' ? 'CONDIZIONI' : 'CONDITIONS'"></h2>
                <label class="checkbox-group">
                    <input type="checkbox" x-model="form.privacy">
                    <span
                        x-text="lang === 'it' ? 'Acconsento al trattamento dati (obbligatorio) [NB: trattamento esclusivamente interno dei dati]' : 'I consent to data processing (required) [Please Note: exclusively internal data processing]'"></span>
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" x-model="form.adesione">
                    <span
                        x-text="lang === 'it' ? 'Aderisco all\'Associazione (obbligatorio)' : 'I join the Association (required)'"></span>
                </label>

                <button class="btn-send" @click="submit()" :disabled="loading" x-text="loading
                        ? (lang === 'it' ? 'INVIO...' : 'SUBMITTING...')
                        : (lang === 'it' ? 'INVIA DOMANDA' : 'SUBMIT')"></button>
            </div>
        </template>

        <template x-if="submitted">
            <div style="text-align: center; padding: 40px;">
                <h1 x-text="lang === 'it' ? 'DOMANDA RICEVUTA' : 'APPLICATION RECEIVED'"></h1>
                <p x-text="lang === 'it' ? 'Grazie per esserti unito a noi.' : 'Thank you for joining us.'"></p>

                <template x-if="form.metodoPagamento === 'HabitatPaypal' || form.metodoPagamento === 'DistrettoPaypal'">
                    <div class="payment-box" style="margin:20px auto; text-align:center;">
                        <p style="font-weight:bold;"
                            x-text="lang === 'it' ? 'Ultimo passo: completa il pagamento della quota (€ 10,00)' : 'Last step: complete the membership fee payment (€ 10.00)'"></p>
                        <a :href="form.metodoPagamento === 'HabitatPaypal' ? 'https://www.paypal.com/ncp/payment/5E4P5CFASVLMA' : 'https://paypal.me/distrettoa'"
                            target="_blank"
                            style="display:inline-block; margin-top:8px; background:#000; color:#fff; padding:12px 30px; text-decoration:none; font-weight:bold;"
                            x-text="lang === 'it' ? 'PAGA CON PAYPAL' : 'PAY WITH PAYPAL'"></a>
                        <template x-if="form.metodoPagamento === 'HabitatPaypal'">
                            <p style="font-size:0.8em; color:#666; margin-top:8px;" x-text="lang === 'it'
                                ? 'Puoi pagare anche con Apple Pay e Carta'
                                : 'You can also pay with Apple Pay and Card'"></p>
                        </template>
                    </div>
                </template>

                <template x-if="form.metodoPagamento === 'HabitatIban' || form.metodoPagamento === 'DistrettoIban'">
                    <div class="payment-box" style="margin:20px auto; text-align:left;">
                        <p style="font-weight:bold;"
                            x-text="lang === 'it' ? 'Ultimo passo: completa il bonifico della quota (€ 10,00)' : 'Last step: complete the bank transfer of the membership fee (€ 10.00)'"></p>
                        <p x-text="'IBAN: ' + (form.metodoPagamento === 'HabitatIban' ? 'IT88Q0623023704000030225469' : 'IT80B0303223701010000636901')"></p>
                        <p x-text="lang === 'it' ? 'Beneficiario: Distretto A APS' : 'Beneficiary: Distretto A APS'"></p>
                        <p x-text="(lang === 'it' ? 'Causale: ' : 'Reference: ') + '&quot;' + (lang === 'it' ? 'Quota associativa ' : 'Membership fee ') + form.nome + ' ' + form.cognome + '&quot;'"></p>
                    </div>
                </template>

                <template x-if="!isArtist && (form.metodoPagamento === 'CashHabitat' || form.metodoPagamento === 'CashDistrettoA')">
                    <p x-text="lang === 'it' ? 'Potrai pagare la quota in contanti presso la sede.' : 'You can pay the membership fee in cash at the venue.'"></p>
                </template>

                <template x-if="isArtist">
                    <p x-text="lang === 'it'
                        ? 'La quota associativa è a carico di Habitat: non devi versare nulla.'
                        : 'The membership fee is covered by Habitat: you do not need to pay anything.'"></p>
                </template>

                <button class="btn-send" style="width:auto; padding:10px 30px" @click="location.reload()"
                    x-text="lang === 'it' ? 'Invia un\'altra' : 'Send another'"></button>
            </div>
        </template>
    </div>

    <script src="../config.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('membershipForm', () => ({
                BASE_URL,
                loading: false,
                submitted: false,
                errorMessage: '',
                lang: 'it',
                interessiOpts: ['Habitat - Cà De Monti', 'Distretto A', 'Quazar - Coworking'],
                isFestival: false,
                isArtist: false,
                form: {
                    email: '', cognome: '', nome: '', dataNascita: '', luogoNascita: '', provNascita: '', paeseNascita: '', codiceFiscale: '',
                    indirizzo: '', cap: '', cittaResidenza: '', provResidenza: '', paeseResidenza: '', telefono: '',
                    interesse: '', metodoPagamento: '', privacy: false, adesione: false,
                    festivalAllergy: false, festivalAllergyNotes: '', festivalCheckinDay: '', festivalCheckinTime: ''
                },
                init() {
                    // Parse query parameters for pre-selection
                    const params = new URLSearchParams(window.location.search);
                    const interestParam = params.get('interest');

                    // Map query param values to display names
                    const interestMap = {
                        'habitat': 'Habitat - Cà De Monti',
                        'distretto': 'Distretto A',
                        'quazar': 'Quazar - Coworking'
                    };

                    // Pre-select if valid param provided
                    if (interestParam && interestMap[interestParam.toLowerCase()]) {
                        this.form.interesse = interestMap[interestParam.toLowerCase()];
                    }

                    const festivalParam = params.get('isFestival');
                    if (festivalParam === 'true') {
                        this.isFestival = true;
                        this.form.interesse = 'Habitat - Cà De Monti';
                    }

                    const artistParam = params.get('artist');
                    if (artistParam === 'true') {
                        this.isArtist = true;
                        this.isFestival = true;
                        this.form.interesse = 'Habitat - Cà De Monti';
                        this.form.metodoPagamento = 'CashHabitat';
                    }

                    // Watch for interest changes and clear incompatible payment methods
                    this.$watch('form.interesse', () => {
                        const habitatMethods = ['CashHabitat', 'HabitatPaypal', 'HabitatIban'];
                        const distrettoMethods = ['CashDistrettoA', 'DistrettoPaypal', 'DistrettoIban'];
                        const current = this.form.metodoPagamento;
                        if (!current) return;

                        const isHabitat = this.form.interesse === 'Habitat - Cà De Monti';
                        const isDistrettoOrQuazar = ['Distretto A', 'Quazar - Coworking'].includes(this.form.interesse);

                        if ((habitatMethods.includes(current) && !isHabitat) ||
                            (distrettoMethods.includes(current) && !isDistrettoOrQuazar)) {
                            this.form.metodoPagamento = '';
                        }
                    });
                },
                async submit() {
                    const required = ['email', 'cognome', 'nome', 'dataNascita', 'luogoNascita', 'provNascita',
                        'paeseNascita', 'indirizzo', 'cap', 'cittaResidenza',
                        'provResidenza', 'paeseResidenza', 'telefono', 'metodoPagamento'];
                    if (this.lang === 'it') required.push('codiceFiscale');

                    if (required.some(k => !this.form[k])) {
                        this.errorMessage = this.lang === 'it'
                            ? "Compila tutti i campi obbligatori"
                            : "Please fill in all required fields";
                        return;
                    }
                    if (!this.form.interesse) {
                        this.errorMessage = this.lang === 'it'
                            ? "Seleziona un interesse"
                            : "Please select an interest";
                        return;
                    }
                    if (this.isFestival && (!this.form.festivalCheckinDay || !this.form.festivalCheckinTime)) {
                        this.errorMessage = this.lang === 'it'
                            ? "Indica il giorno e l'orario di arrivo previsto"
                            : "Please provide your expected arrival day and time";
                        return;
                    }
                    if (!this.form.privacy || !this.form.adesione) {
                        this.errorMessage = this.lang === 'it'
                            ? "Accetta le condizioni obbligatorie"
                            : "Please accept the required conditions";
                        return;
                    }

                    this.loading = true;
                    this.errorMessage = '';

                    const interestMap = {
                        'Habitat - Cà De Monti': 'habitat',
                        'Distretto A': 'distrettoA',
                        'Quazar - Coworking': 'quazar'
                    };

                    const interests = {
                        habitat: false,
                        dawe: false,  // Always false - deprecated
                        quazar: false,
                        distrettoA: false
                    };

                    const selectedKey = interestMap[this.form.interesse];
                    if (selectedKey) {
                        interests[selectedKey] = true;
                    }

                    const payload = {
                        email: this.form.email,
                        surname: this.form.cognome,
                        name: this.form.nome,
                        birthDate: this.form.dataNascita,
                        birthPlace: this.form.luogoNascita,
                        birthProvince: this.form.provNascita,
                        birthCountry: this.form.paeseNascita,
                        vatNumber: this.lang === 'it' ? this.form.codiceFiscale : null,
                        address: this.form.indirizzo,
                        zipcode: this.form.cap,
                        city: this.form.cittaResidenza,
                        province: this.form.provResidenza,
                        country: this.form.paeseResidenza,
                        phoneNumber: this.form.telefono,
                        interests,
                        paymentMethod: this.form.metodoPagamento,
                        acceptPrivacy: this.form.privacy,
                        acceptStatute: this.form.adesione,
                        language: this.lang,
                        festivalAllergy: this.isFestival ? this.form.festivalAllergy : undefined,
                        festivalAllergyNotes: (this.isFestival && this.form.festivalAllergy) ? this.form.festivalAllergyNotes || null : undefined,
                        festivalCheckinDay: this.isFestival ? (this.form.festivalCheckinDay || null) : undefined,
                        festivalCheckinTime: this.isFestival ? (this.form.festivalCheckinTime || null) : undefined,
                        isArtist: this.isArtist ? true : undefined,
                    };

                    try {
                        const res = await fetch(`${this.BASE_URL}/membership/`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (res.status === 401) {
                            this.errorMessage = this.lang === 'it'
                                ? "Errore di configurazione server: accesso negato a risorsa pubblica."
                                : "Server configuration error: access denied to public resource.";
                            return;
                        }

                        if (!res.ok) {
                            const data = await res.json().catch(() => null);
                            if (data?.fields?.length) {
                                throw new Error(
                                    (data.error || (this.lang === 'it' ? 'Errore' : 'Error'))
                                    + ': ' + data.fields.join(', ')
                                );
                            }
                            throw new Error(
                                data?.error
                                || (this.lang === 'it' ? "Errore durante l'invio dei dati." : "Error submitting the form.")
                            );
                        }

                        this.submitted = true;
                    } catch (e) {
                        this.errorMessage = e.message;
                    } finally {
                        this.loading = false;
                    }
                }
            }));
