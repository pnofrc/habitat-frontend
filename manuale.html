<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitat Formulario - Manuale Utente</title>
    <link rel="icon" href="https://habitattt.it/images/h.favicon.png" type="image/png">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: #f4f4f4;
            color: #000;
            line-height: 1.6;
        }

        .header {
            background: #fff;
            border-bottom: 2px solid #000;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .header h1 {
            font-size: 1.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .lang-toggle {
            display: flex;
            border: 2px solid #000;
            font-size: 0.75em;
            font-weight: bold;
        }

        .lang-toggle button {
            padding: 6px 12px;
            border: none;
            background: white;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: inherit;
            text-transform: uppercase;
        }

        .lang-toggle button.active {
            background: #000;
            color: #fff;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 30px;
            padding: 30px 20px;
        }

        .sidebar-nav {
            width: 280px;
            flex-shrink: 0;
            position: sticky;
            top: 100px;
            height: fit-content;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .nav-card {
            background: #fff;
            border: 2px solid #000;
            box-shadow: 8px 8px 0px #000;
            padding: 20px;
        }

        .search-box {
            width: 100%;
            padding: 8px;
            border: 2px solid #000;
            font-family: inherit;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .nav-section {
            margin-bottom: 15px;
        }

        .nav-title {
            font-weight: bold;
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px solid #000;
        }

        .nav-link {
            display: block;
            padding: 5px 0;
            color: #000;
            text-decoration: none;
            font-size: 0.8em;
            transition: padding-left 0.2s;
        }

        .nav-link:hover {
            text-decoration: underline;
            padding-left: 5px;
        }

        .nav-link.active {
            font-weight: bold;
        }

        .nav-sublink {
            padding-left: 15px;
            font-size: 0.75em;
            color: #666;
        }

        .main-content {
            flex: 1;
            min-width: 0;
        }

        .section {
            background: #fff;
            border: 2px solid #000;
            box-shadow: 10px 10px 0px #000;
            padding: 40px;
            margin-bottom: 40px;
        }

        .section-header {
            background: #000;
            color: #fff;
            padding: 15px 20px;
            margin: -40px -40px 30px -40px;
            text-transform: uppercase;
            font-size: 1.3em;
            letter-spacing: 2px;
        }

        .subsection-header {
            background: #000;
            color: #fff;
            padding: 10px 15px;
            margin: 30px 0 20px 0;
            text-transform: uppercase;
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        h3 {
            font-size: 1em;
            text-transform: uppercase;
            margin: 25px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #000;
        }

        p {
            margin-bottom: 15px;
        }

        .step-box {
            border: 2px solid #000;
            padding: 25px 25px 25px 80px;
            margin: 20px 0;
            position: relative;
            background: #fff;
        }

        .step-number {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: #000;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
        }

        .step-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .step-body {
            font-size: 0.95em;
        }

        .info-box {
            padding: 15px 15px 15px 20px;
            margin: 20px 0;
            border-left: 8px solid #666;
            background: #f9f9f9;
        }

        .info-box.tip {
            border-left-color: #2b6cb0;
            background: #e6f2ff;
        }

        .info-box.warning {
            border-left-color: #c53030;
            background: #fee;
        }

        .info-box.note {
            border-left-color: #b7791f;
            background: #fff5e6;
        }

        .info-box-icon {
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .screenshot {
            border: 3px solid #000;
            padding: 15px;
            margin: 20px 0;
            background: #f0f0f0;
            text-align: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.15);
        }

        .screenshot-placeholder {
            padding: 60px 20px;
            background: #e0e0e0;
            color: #666;
            font-style: italic;
        }

        .screenshot-caption {
            margin-top: 10px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .role-badge {
            display: inline-block;
            font-size: 0.75em;
            padding: 3px 8px;
            border: 2px solid currentColor;
            text-transform: uppercase;
            font-weight: bold;
            margin: 0 3px;
        }

        .role-badge.admin {
            color: #c53030;
            background: #fee;
        }

        .role-badge.reader {
            color: #2b6cb0;
            background: #e6f2ff;
        }

        .role-badge.reader_limited {
            color: #b7791f;
            background: #fff5e6;
        }

        .flow-diagram {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            border: 2px solid #000;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .flow-step {
            padding: 10px 20px;
            border: 2px solid #000;
            background: #fff;
            font-weight: bold;
            font-size: 0.85em;
            text-transform: uppercase;
        }

        .flow-arrow {
            font-size: 1.5em;
            font-weight: bold;
        }

        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border: 1px solid #ccc;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }

        ul, ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        li {
            margin-bottom: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 1px solid #000;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #000;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .accordion {
            margin: 20px 0;
        }

        details {
            border: 2px solid #000;
            margin-bottom: 10px;
            background: #fff;
        }

        summary {
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            background: #f9f9f9;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        summary:hover {
            background: #f0f0f0;
        }

        details[open] summary {
            background: #000;
            color: #fff;
        }

        .details-content {
            padding: 20px;
        }

        footer {
            background: #000;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            margin-top: 50px;
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar-nav {
                width: 100%;
                position: static;
                max-height: none;
            }

            .section {
                padding: 25px;
            }

            .section-header {
                margin: -25px -25px 20px -25px;
                padding: 12px 15px;
                font-size: 1.1em;
            }

            .step-box {
                padding: 70px 20px 20px 20px;
            }

            .step-number {
                left: 50%;
                top: 15px;
                transform: translateX(-50%);
            }
        }

        @media print {
            .sidebar-nav, .lang-toggle {
                display: none;
            }

            .section {
                box-shadow: none;
                page-break-inside: avoid;
            }

            details {
                border: 1px solid #000;
            }

            details summary {
                display: none;
            }

            details .details-content {
                display: block !important;
            }
        }
    </style>
</head>
<body x-data="manualApp" x-cloak>

    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <img class="header-logo" src="https://habitattt.it/images/h.logo.png" alt="Habitat logo">
                <h1 x-text="t.title"></h1>
            </div>
            <div class="lang-toggle">
                <button @click="lang = 'it'" :class="lang === 'it' && 'active'">IT</button>
                <button @click="lang = 'en'" :class="lang === 'en' && 'active'">EN</button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar-nav">
            <div class="nav-card">
                <input
                    type="text"
                    class="search-box"
                    x-model="searchQuery"
                    :placeholder="lang === 'it' ? 'Cerca...' : 'Search...'"
                >

                <template x-for="section in filteredNav" :key="section.id">
                    <div class="nav-section">
                        <div class="nav-title" x-text="section.title"></div>
                        <template x-for="sub in section.subs" :key="sub.id">
                            <a :href="'#' + sub.id" class="nav-link nav-sublink" x-text="sub.title"></a>
                        </template>
                    </div>
                </template>
            </div>
        </aside>

        <main class="main-content">
            <!-- INTRODUZIONE -->
            <section id="intro" class="section">
                <h2 class="section-header" x-text="t.intro.title"></h2>

                <div x-html="t.intro.what"></div>

                <div class="info-box tip">
                    <div class="info-box-icon" x-text="lang === 'it' ? 'ℹ SUGGERIMENTO' : 'ℹ TIP'"></div>
                    <div x-html="t.intro.tip"></div>
                </div>

                <h3 x-text="t.intro.navigationTitle"></h3>
                <div x-html="t.intro.navigation"></div>
            </section>

            <!-- PER AMMINISTRATORI -->
            <section id="admin-intro" class="section">
                <h2 class="section-header" x-text="t.adminIntro.title"></h2>

                <div x-html="t.adminIntro.intro"></div>

                <h3 x-text="t.adminIntro.rolesTitle"></h3>
                <table>
                    <thead>
                        <tr>
                            <th x-text="lang === 'it' ? 'Ruolo' : 'Role'"></th>
                            <th x-text="lang === 'it' ? 'Permessi' : 'Permissions'"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><span class="role-badge admin">ADMIN</span></td>
                            <td x-text="lang === 'it' ? 'Accesso completo a tutte le funzionalità' : 'Full access to all features'"></td>
                        </tr>
                        <tr>
                            <td><span class="role-badge reader">READER</span></td>
                            <td x-text="lang === 'it' ? 'Può visualizzare e modificare tutti i dati' : 'Can view and edit all data'"></td>
                        </tr>
                        <tr>
                            <td><span class="role-badge reader_limited">READER LIMITED</span></td>
                            <td x-text="lang === 'it' ? 'Accesso limitato alle schede configurate' : 'Limited access to configured tabs'"></td>
                        </tr>
                    </tbody>
                </table>

                <div class="step-box">
                    <div class="step-number">1</div>
                    <div class="step-title" x-text="t.adminIntro.loginTitle"></div>
                    <div class="step-body" x-html="t.adminIntro.loginBody"></div>
                </div>

                <div class="step-box">
                    <div class="step-number">2</div>
                    <div class="step-title" x-text="t.adminIntro.navTitle"></div>
                    <div class="step-body" x-html="t.adminIntro.navBody"></div>
                </div>
            </section>

            <section id="admin-expenses" class="section">
                <h2 class="section-header" x-text="t.expenses.title"></h2>

                <div x-html="t.expenses.intro"></div>

                <h3 x-text="t.expenses.statsTitle"></h3>
                <div x-html="t.expenses.statsBody"></div>

                <h3 x-text="t.expenses.addTitle"></h3>
                <div x-html="t.expenses.addBody"></div>

                <h3 x-text="t.expenses.filterTitle"></h3>
                <div x-html="t.expenses.filterBody"></div>
            </section>

            <section id="admin-finance" class="section">
                <h2 class="section-header" x-text="t.finance.title"></h2>

                <div x-html="t.finance.intro"></div>

                <div class="info-box note">
                    <div class="info-box-icon" x-text="lang === 'it' ? 'ℹ DIFFERENZA' : 'ℹ DIFFERENCE'"></div>
                    <div x-html="t.finance.difference"></div>
                </div>

                <h2 class="subsection-header" x-text="t.finance.overview.title"></h2>
                <div x-html="t.finance.overview.body"></div>

                <h3 x-text="t.finance.overview.cardsTitle"></h3>
                <div x-html="t.finance.overview.cardsBody"></div>

                <h3 x-text="t.finance.overview.progressTitle"></h3>
                <div x-html="t.finance.overview.progressBody"></div>

                <h2 class="subsection-header" x-text="t.finance.transactions.title"></h2>
                <div x-html="t.finance.transactions.body"></div>

                <h3 x-text="t.finance.transactions.includeTitle"></h3>
                <div x-html="t.finance.transactions.includeBody"></div>

                <div class="info-box tip">
                    <div class="info-box-icon" x-text="lang === 'it' ? 'ℹ SUGGERIMENTO' : 'ℹ TIP'"></div>
                    <div x-html="t.finance.transactions.tip"></div>
                </div>

                <h2 class="subsection-header" x-text="t.finance.categories.title"></h2>
                <div x-html="t.finance.categories.body"></div>

                <h2 class="subsection-header" x-text="t.finance.bin.title"></h2>
                <div x-html="t.finance.bin.body"></div>

                <h3 x-text="t.finance.bin.restoreTitle"></h3>
                <div x-html="t.finance.bin.restoreBody"></div>

                <h2 class="subsection-header" x-text="t.finance.forecast.title"></h2>
                <div x-html="t.finance.forecast.body"></div>

                <h3 x-text="t.finance.forecast.yearlyTitle"></h3>
                <div x-html="t.finance.forecast.yearlyBody"></div>

                <h3 x-text="t.finance.forecast.targetsTitle"></h3>
                <div x-html="t.finance.forecast.targetsBody"></div>
            </section>

            <section id="admin-guests" class="section">
                <h2 class="section-header" x-text="t.guests.title"></h2>

                <div x-html="t.guests.intro"></div>

                <div class="flow-diagram">
                    <div class="flow-step" x-text="lang === 'it' ? 'Crea Ospite' : 'Create Guest'"></div>
                    <div class="flow-arrow">→</div>
                    <div class="flow-step" x-text="lang === 'it' ? 'Prenotazione' : 'Booking'"></div>
                    <div class="flow-arrow">→</div>
                    <div class="flow-step">Check-in</div>
                    <div class="flow-arrow">→</div>
                    <div class="flow-step">Check-out</div>
                    <div class="flow-arrow">→</div>
                    <div class="flow-step" x-text="lang === 'it' ? 'Fattura' : 'Invoice'"></div>
                </div>

                <h3 x-text="t.guests.createTitle"></h3>
                <div x-html="t.guests.createBody"></div>

                <h3 x-text="t.guests.bookingTitle"></h3>
                <div x-html="t.guests.bookingBody"></div>

                <h3 x-text="t.guests.checkinTitle"></h3>
                <div x-html="t.guests.checkinBody"></div>

                <h3 x-text="t.guests.checkoutTitle"></h3>
                <div x-html="t.guests.checkoutBody"></div>
            </section>

            <section id="admin-applications" class="section">
                <h2 class="section-header" x-text="t.applications.title"></h2>

                <div x-html="t.applications.intro"></div>

                <h3 x-text="t.applications.residencyTitle"></h3>
                <div x-html="t.applications.residencyBody"></div>

                <h3 x-text="t.applications.membershipTitle"></h3>
                <div x-html="t.applications.membershipBody"></div>

                <h3 x-text="t.applications.festivalTitle"></h3>
                <div x-html="t.applications.festivalBody"></div>
            </section>

            <section id="admin-festival-planner" class="section">
                <h2 class="section-header" x-text="t.festivalPlanner.title"></h2>

                <div x-html="t.festivalPlanner.intro"></div>

                <h2 class="subsection-header" x-text="t.festivalPlanner.gridTitle"></h2>
                <div x-html="t.festivalPlanner.gridBody"></div>

                <h3 x-text="t.festivalPlanner.colorsTitle"></h3>
                <div x-html="t.festivalPlanner.colorsBody"></div>

                <h2 class="subsection-header" x-text="t.festivalPlanner.venuesTitle"></h2>
                <div x-html="t.festivalPlanner.venuesBody"></div>

                <h2 class="subsection-header" x-text="t.festivalPlanner.unscheduledTitle"></h2>
                <div x-html="t.festivalPlanner.unscheduledBody"></div>

                <h3 x-text="t.festivalPlanner.budgetTitle"></h3>
                <div x-html="t.festivalPlanner.budgetBody"></div>
            </section>

            <section id="admin-festival-volunteers" class="section">
                <h2 class="section-header" x-text="t.festivalVolunteers.title"></h2>

                <div x-html="t.festivalVolunteers.intro"></div>

                <h3 x-text="t.festivalVolunteers.createTitle"></h3>
                <div x-html="t.festivalVolunteers.createBody"></div>

                <h3 x-text="t.festivalVolunteers.tableTitle"></h3>
                <div x-html="t.festivalVolunteers.tableBody"></div>
            </section>

            <section id="admin-festival-timeline" class="section">
                <h2 class="section-header" x-text="t.festivalTimeline.title"></h2>

                <div x-html="t.festivalTimeline.intro"></div>

                <h3 x-text="t.festivalTimeline.createTitle"></h3>
                <div x-html="t.festivalTimeline.createBody"></div>

                <h3 x-text="t.festivalTimeline.vizTitle"></h3>
                <div x-html="t.festivalTimeline.vizBody"></div>

                <div class="info-box tip">
                    <div class="info-box-icon" x-text="lang === 'it' ? 'ℹ SUGGERIMENTO' : 'ℹ TIP'"></div>
                    <div x-html="t.festivalTimeline.tip"></div>
                </div>
            </section>

            <section id="admin-calendar" class="section">
                <h2 class="section-header" x-text="t.calendar.title"></h2>

                <div x-html="t.calendar.intro"></div>

                <h3 x-text="t.calendar.createTitle"></h3>
                <div x-html="t.calendar.createBody"></div>

                <div class="info-box tip">
                    <div class="info-box-icon" x-text="lang === 'it' ? 'ℹ SUGGERIMENTO' : 'ℹ TIP'"></div>
                    <div x-html="t.calendar.tip"></div>
                </div>
            </section>

            <section id="admin-spreadsheets" class="section">
                <h2 class="section-header" x-text="t.spreadsheets.title"></h2>

                <div x-html="t.spreadsheets.intro"></div>

                <h3 x-text="t.spreadsheets.flowTitle"></h3>
                <div x-html="t.spreadsheets.flowBody"></div>

                <h3 x-text="t.spreadsheets.associatiTitle"></h3>
                <div x-html="t.spreadsheets.associatiBody"></div>

                <div class="info-box tip">
                    <div class="info-box-icon" x-text="lang === 'it' ? 'ℹ SUGGERIMENTO' : 'ℹ TIP'"></div>
                    <div x-html="t.spreadsheets.tip"></div>
                </div>
            </section>

            <section id="admin-users" class="section">
                <h2 class="section-header">
                    <span x-text="t.users.title"></span>
                    <span class="role-badge admin" style="margin-left: 15px;">ADMIN ONLY</span>
                </h2>

                <div x-html="t.users.intro"></div>

                <div class="info-box warning">
                    <div class="info-box-icon" x-text="lang === 'it' ? '🔒 SOLO ADMIN' : '🔒 ADMIN ONLY'"></div>
                    <div x-html="t.users.adminOnly"></div>
                </div>

                <h3 x-text="t.users.rolesTitle"></h3>
                <div x-html="t.users.rolesBody"></div>

                <h3 x-text="t.users.createTitle"></h3>
                <div x-html="t.users.createBody"></div>

                <h3 x-text="t.users.permissionsTitle"></h3>
                <div x-html="t.users.permissionsBody"></div>

                <h3 x-text="t.users.statusTitle"></h3>
                <div x-html="t.users.statusBody"></div>
            </section>

            <section id="admin-telegram" class="section">
                <h2 class="section-header">
                    <span x-text="t.telegram.title"></span>
                    <span class="role-badge admin" style="margin-left: 15px;">ADMIN ONLY</span>
                </h2>

                <div x-html="t.telegram.intro"></div>

                <h3 x-text="t.telegram.chatsTitle"></h3>
                <div x-html="t.telegram.chatsBody"></div>

                <h3 x-text="t.telegram.notificationsTitle"></h3>
                <div x-html="t.telegram.notificationsBody"></div>

                <h3 x-text="t.telegram.digestTitle"></h3>
                <div x-html="t.telegram.digestBody"></div>

                <h3 x-text="t.telegram.testTitle"></h3>
                <div x-html="t.telegram.testBody"></div>
            </section>

            <section id="admin-activity" class="section">
                <h2 class="section-header">
                    <span x-text="t.activity.title"></span>
                    <span class="role-badge admin" style="margin-left: 15px;">ADMIN ONLY</span>
                </h2>

                <div x-html="t.activity.intro"></div>

                <h3 x-text="t.activity.subtabsTitle"></h3>
                <div x-html="t.activity.subtabsBody"></div>

                <h3 x-text="t.activity.filterTitle"></h3>
