<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Full Members Sheet - Habitat</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: courier, monospace; margin: 0; background: #f4f4f4; color: #000; font-size: 11px; }
        .toolbar { background: #000; color: #fff; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; height: 40px; }
        .toolbar input { background: #222; border: 1px solid #444; color: #fff; padding: 4px; font-family: inherit; font-size: 10px; width: 200px; }
        .sheet-container { overflow: auto; height: calc(100vh - 40px); background: #fff; }
        table { border-collapse: collapse; min-width: 100%; table-layout: fixed; }
        th { background: #eee; border: 1px solid #ccc; padding: 8px; position: sticky; top: 0; z-index: 5; text-transform: uppercase; font-size: 9px; width: 140px; }
        td { border: 1px solid #ccc; padding: 6px; white-space: nowrap; background: #fff; outline: none; overflow: hidden; text-overflow: ellipsis; }
        tr:hover td { background: #fffdf0; }
        td:focus { background: #fff !important; box-shadow: inset 0 0 0 2px #000; }
        .row-num { width: 40px; background: #eee; text-align: center; font-weight: bold; border-right: 2px solid #ccc; position: sticky; left: 0; z-index: 6; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .saving { background: orange; } .saved { background: green; } .error { background: red; }
        .btn-export { background: #fff; border: none; padding: 4px 8px; cursor: pointer; font-family: inherit; font-size: 9px; font-weight: bold; }
    </style>
</head>
<body x-data="memberSheet" x-init="init()" x-cloak>

    <div class="toolbar">
        <div>
            <span class="status-dot" :class="status"></span>
            <b x-text="statusMsg"></b>
            <input type="text" x-model="search" placeholder="CERCA COGNOME/NOME..." style="margin-left:15px">
        </div>
        <div>
            <button class="btn-export" @click="exportCSV()">EXPORT CSV</button>
            <button class="btn-export" onclick="window.close()" style="margin-left:5px">CLOSE</button>
        </div>
    </div>

    <div class="sheet-container">
        <table>
            <thead>
                <tr>
                    <th class="row-num">#</th>
                    <th>Cognome</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Data Nascita (DD/MM/YYYY)</th>
                    <th>Luogo Nascita</th>
                    <th>Prov Nascita</th>
                    <th>Paese Nascita</th>
                    <th>Codice Fiscale</th>
                    <th>Indirizzo</th>
                    <th>CAP</th>
                    <th>Città Residenza</th>
                    <th>Prov Residenza</th>
                    <th>Paese Residenza</th>
                    <th>Telefono</th>
                    <th style="width:250px">Interessi</th>
                    <th>Metodo Pagamento</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="(m, index) in filteredItems" :key="m.id">
                    <tr>
                        <td class="row-num" x-text="index + 1"></td>
                        <td contenteditable="true" @blur="save(m.id, 'surname', $event.target.innerText)" x-text="m.surname"></td>
                        <td contenteditable="true" @blur="save(m.id, 'name', $event.target.innerText)" x-text="m.name"></td>
                        <td contenteditable="true" @blur="save(m.id, 'email', $event.target.innerText)" x-text="m.email"></td>
                        <td contenteditable="true" @blur="saveDate(m.id, 'birthDate', $event.target.innerText)" x-text="formatDate(m.birthDate)"></td>
                        <td contenteditable="true" @blur="save(m.id, 'birthPlace', $event.target.innerText)" x-text="m.birthPlace"></td>
                        <td contenteditable="true" @blur="save(m.id, 'birthProvince', $event.target.innerText)" x-text="m.birthProvince"></td>
                        <td contenteditable="true" @blur="save(m.id, 'birthCountry', $event.target.innerText)" x-text="m.birthCountry"></td>
                        <td contenteditable="true" @blur="save(m.id, 'vatNumber', $event.target.innerText)" x-text="m.vatNumber" style="text-transform: uppercase"></td>
                        <td contenteditable="true" @blur="save(m.id, 'address', $event.target.innerText)" x-text="m.address"></td>
                        <td contenteditable="true" @blur="save(m.id, 'zipcode', $event.target.innerText)" x-text="m.zipcode"></td>
                        <td contenteditable="true" @blur="save(m.id, 'city', $event.target.innerText)" x-text="m.city"></td>
                        <td contenteditable="true" @blur="save(m.id, 'province', $event.target.innerText)" x-text="m.province"></td>
                        <td contenteditable="true" @blur="save(m.id, 'country', $event.target.innerText)" x-text="m.country"></td>
                        <td contenteditable="true" @blur="save(m.id, 'phoneNumber', $event.target.innerText)" x-text="m.phoneNumber"></td>
                        <td x-text="[m.interestHabitat && 'Habitat', m.interestDawe && 'DAWE', m.interestQuazar && 'Quazar', m.interestWorkshops && 'Workshops'].filter(Boolean).join(', ')"></td>
                        <td contenteditable="true" @blur="save(m.id, 'paymentMethod', $event.target.innerText)" x-text="m.paymentMethod"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('memberSheet', () => ({
                BASE_URL: 'http://localhost:3000',
                token: localStorage.getItem('token'),
                items: [],
                search: '',
                status: 'idle',
                statusMsg: 'READY',

                async init() {
                    if (!this.token) return window.close();
                    await this.fetchData();
                },

                async fetchData() {
                    const res = await fetch(`${this.BASE_URL}/membership/`, {
                        headers: { 'Authorization': `Bearer ${this.token}` }
                    });
                    this.items = await res.json();
                },

                get filteredItems() {
                    return this.items.filter(i =>
                        (i.surname + ' ' + i.name).toLowerCase().includes(this.search.toLowerCase())
                    );
                },

                formatDate(d) {
                    if (!d) return '';
                    const date = new Date(d);
                    if (isNaN(date.getTime())) return d;
                    return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
                },

                async saveDate(id, field, ddmm) {
                    const p = ddmm.split('/');
                    if (p.length !== 3) return;
                    await this.save(id, field, `${p[2]}-${p[1]}-${p[0]}`);
                },

                async save(id, field, value) {
                    this.status = 'saving'; this.statusMsg = 'SAVING...';
                    try {
                        const res = await fetch(`${this.BASE_URL}/membership/${id}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` },
                            body: JSON.stringify({ [field]: value })
                        });
                        if (!res.ok) throw new Error();
                        this.status = 'saved'; this.statusMsg = 'SAVED';
                    } catch (e) {
                        this.status = 'error'; this.statusMsg = 'ERROR!';
                    }
                },

                exportCSV() {
                    const headers = "Cognome,Nome,Email,DataNascita,CF,Citta,Telefono,Pagamento\n";
                    const rows = this.filteredItems.map(m =>
                        `${m.surname},${m.name},${m.email},${this.formatDate(m.birthDate)},${m.vatNumber},${m.city},${m.phoneNumber},${m.paymentMethod}`
                    ).join("\n");
                    const blob = new Blob([headers + rows], { type: 'text/csv' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'database_soci.csv';
                    a.click();
                }
            }));
        });
    </script>
</body>
</html>
