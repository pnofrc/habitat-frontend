<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: courier;
            margin: 0;
            background: #fff;
            color: #000;
            font-size: 14px;
        }

        .container {
            padding: 20px;
            max-width: 1100px;
            margin: auto;
        }

        nav {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #000;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 10;
        }

        button {
            font-family: inherit !important;
            background: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
        }

        button:hover {
            text-decoration: underline;
        }

        nav button.active {
            text-decoration: underline;
        }

        .card {
            border: 1px solid #000;
            padding: 15px;
            margin-bottom: 20px;
        }

        .logincard {
            border: 1px solid #000;
            padding: 15px;
            margin-bottom: 20px;
            width: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        table td {
            white-space: nowrap;
        }

        th {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        .sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: 350px;
            height: 100%;
            background: #fff;
            border-left: 1px solid #000;
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.05);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 6px;
            margin: 4px 0 12px;
            border: 1px solid #000;
            font-family: inherit;
            font-size: 13px;
        }

        label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
        }

        .btn-blk {
            background: #000;
            color: #fff;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .btn-del {
            color: red;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
        }

        .in-casa {
            color: #2c7a7b;
            font-weight: bold;
            font-size: 11px;
        }

        .sub-box {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }

        .create {
            margin-bottom: 15px;
            background: #000;
            color: #fff;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
        }

        .alert-red {
            background-color: rgba(255, 0, 0, 0.1) !important;
        }

        .status-tag {
            font-size: 9px;
            padding: 2px 4px;
            border: 1px solid currentColor;
            margin-left: 10px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-box {
            background: #fff;
            border: 1px solid #000;
            padding: 20px 25px;
            min-width: 280px;
            text-align: center;
        }

        .modal-box p {
            margin: 0 0 15px;
        }

        .modal-box button {
            margin: 0 5px;
            padding: 8px 20px;
        }

        .role-badge {
            font-size: 9px;
            padding: 2px 6px;
            border: 1px solid currentColor;
            text-transform: uppercase;
        }

        .role-admin {
            color: #c53030;
        }

        .role-reader {
            color: #2b6cb0;
        }

        .role-reader_limited {
            color: #b7791f;
        }

        .tab-chip {
            display: inline-block;
            font-size: 10px;
            padding: 1px 5px;
            border: 1px solid #ccc;
            margin: 1px;
        }

        .user-info {
            font-size: 11px;
            color: #666;
            margin-right: 10px;
        }

        /* FullCalendar overrides */
        .fc {
            font-family: courier, monospace;
            font-size: 13px;
        }

        .fc .fc-toolbar-title {
            font-size: 16px;
            text-transform: uppercase;
        }

        .fc .fc-button {
            font-family: courier, monospace;
            font-size: 11px;
            text-transform: uppercase;
            background: #000;
            border-color: #000;
        }

        .fc .fc-button:hover {
            background: #333;
            border-color: #333;
        }

        .fc .fc-button-active {
            background: #333 !important;
            border-color: #333 !important;
        }

        .fc .fc-daygrid-event {
            font-size: 11px;
        }

        .planner-sub-tabs,
        .day-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .planner-sub-tabs button,
        .day-tabs button {
            border: 1px solid #000;
            padding: 6px 10px;
            text-transform: uppercase;
            font-size: 11px;
        }

        .planner-sub-tabs button.active,
        .day-tabs button.active {
            background: #000;
            color: #fff;
        }

        .activity-sub-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .activity-sub-tabs button {
            border: 1px solid #000;
            padding: 6px 10px;
            text-transform: uppercase;
            font-size: 11px;
        }

        .activity-sub-tabs button.active {
            background: #000;
            color: #fff;
        }

        .activity-filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
            align-items: end;
        }

        .activity-filter-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .activity-filter-actions .btn-blk,
        .activity-filter-actions .btn-del {
            width: auto;
            padding: 6px 14px;
            margin-top: 0;
            font-size: 0.85em;
        }

        .activity-pagination {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .activity-pagination button[disabled] {
            opacity: 0.4;
            cursor: default;
            text-decoration: none;
        }

        .activity-table {
            table-layout: fixed;
        }

        .activity-table td,
        .activity-table th {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .activity-details {
            white-space: normal;
            word-break: break-word;
            max-width: 260px;
        }

        .activity-badge {
            display: inline-block;
            padding: 2px 6px;
            border: 1px solid #000;
            font-size: 9px;
            text-transform: uppercase;
        }

        .badge-success {
            color: #2f855a;
            border-color: #2f855a;
        }

        .badge-error {
            color: #c53030;
            border-color: #c53030;
        }

        .day-venue-toggles { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
        .venue-toggle { padding: 4px 10px; border: 1px solid #ccc; border-radius: 12px; font-size: 11px; cursor: pointer; color: #999; }
        .venue-toggle.active { background: #2b6cb0; color: #fff; border-color: #2b6cb0; }

        .planner-grid {
            display: grid;
            gap: 0;
            position: relative;
            border: 1px solid #000;
            background: #fff;
        }

        .time-label {
            font-size: 10px;
            color: #666;
            padding: 2px 4px;
            border-right: 1px solid #eee;
            border-bottom: 1px solid #eee;
            text-align: right;
        }

        .time-label.header {
            border-bottom: 1px solid #000;
            background: #f7f7f7;
        }

        .venue-header {
            font-size: 11px;
            text-transform: uppercase;
            padding: 6px 8px;
            border-bottom: 1px solid #000;
            border-left: 1px solid #eee;
            background: #f7f7f7;
        }

        .grid-cell {
            border-left: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .act-card {
            position: relative;
            border: 1px solid #000;
            padding: 6px 6px;
            font-size: 11px;
            overflow: hidden;
            cursor: pointer;
        }

        .act-card small {
            display: block;
            font-size: 9px;
            color: #333;
        }

        .act-card.cancelled {
            text-decoration: line-through;
            opacity: 0.7;
        }

        .act-badge {
            display: inline-block;
            font-size: 8px;
            padding: 1px 4px;
            border: 1px solid #000;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .unscheduled-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .unscheduled-chip {
            border: 1px solid #000;
            padding: 4px 8px;
            font-size: 10px;
            cursor: pointer;
        }

        .unscheduled-chip.cancelled {
            text-decoration: line-through;
            opacity: 0.7;
        }

        .planner-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            font-size: 10px;
            align-items: center;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #000;
            padding: 3px 6px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border: 1px solid #000;
            display: inline-block;
        }

        .task-chip {
            display: inline-block;
            border: 1px solid #000;
            padding: 2px 6px;
            font-size: 10px;
            margin: 2px 4px 2px 0;
        }

        .timeline-wrap {
            border: 1px solid #000;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            overflow-x: auto;
        }

        .timeline-line {
            position: relative;
            height: 2px;
            background: #000;
            margin: 20px 0 10px;
        }

        .timeline-dot {
            position: absolute;
            top: -5px;
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid #000;
            border-radius: 50%;
            transform: translateX(-50%);
            cursor: pointer;
        }

        .timeline-dot .label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            white-space: nowrap;
            background: #fff;
            padding: 2px 4px;
            border: 1px solid #000;
        }

        .timeline-today {
            position: absolute;
            top: -10px;
            width: 2px;
            height: 24px;
            background: #e53e3e;
            transform: translateX(-50%);
        }

        .timeline-today .today-label {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            white-space: nowrap;
            color: #e53e3e;
            margin-top: 2px;
        }

        .timeline-axis {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #555;
        }

        .venue-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding: 6px 0;
            font-size: 12px;
        }

        .planner-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .planner-actions button {
            height: 34px;
            display: inline-flex;
            align-items: center;
            padding: 0 14px;
        }

        .planner-actions .create {
            padding: 0 14px;
            margin-bottom: 0;
        }
    </style>
</head>

<body x-data="app" x-cloak>

    <template x-if="!token">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center;">
            <div class="logincard" @keydown.enter="login">
                <img src="https://habitattt.it/images/h.logo.png" alt="Habitat"
                    style="height: 40px; margin-bottom: 15px;">
                <label>Username</label><input type="text" x-model="loginData.username">
                <label>Password</label><input type="password" x-model="loginData.password">
                <button class="btn-blk" @click="login">ENTRA</button>
            </div>
        </div>
    </template>

    <template x-if="token">
        <main>
            <nav>
                <img src="https://habitattt.it/images/h.logo.png" alt="Habitat"
                    style="height: 28px; margin-right: 10px;">
                <button x-show="visibleTabs.includes('expenses')" :class="view === 'expenses' && 'active'"
                    @click="setView('expenses')">Flow Cassa</button>
                <button x-show="visibleTabs.includes('guests')" :class="view === 'guests' && 'active'"
                    @click="setView('guests')">Ospitalita'</button>
                <button x-show="visibleTabs.includes('bookings')" :class="view === 'bookings' && 'active'"
                    @click="setView('bookings')">Prenotazioni</button>
                <button x-show="visibleTabs.includes('residency')" :class="view === 'residency' && 'active'"
                    @click="setView('residency')">Residenze <span x-show="residencyCount > 0"
                        x-text="'(' + residencyCount + ')'"></span></button>
                <button x-show="visibleTabs.includes('membership')"
                    :class="view === 'membership' && membershipTab === 'requests' && 'active'"
                    @click="membershipTab = 'requests'; setView('membership')">Richiesta Tessere <span
                        x-show="membershipRequestCount > 0" x-text="'(' + membershipRequestCount + ')'"></span></button>
                <button x-show="visibleTabs.includes('membership')"
                    :class="view === 'membership' && membershipTab === 'confirmed' && 'active'"
                    @click="membershipTab = 'confirmed'; setView('membership')">Tesserati <span
                        x-show="membershipConfirmedCount > 0"
                        x-text="'(' + membershipConfirmedCount + ')'"></span></button>
                <button x-show="visibleTabs.includes('festival')" :class="view === 'festival' && 'active'"
                    @click="setView('festival')">Festival <span x-show="festivalTicketCount > 0"
                        x-text="'(' + festivalTicketCount + ')'"></span></button>
                <button x-show="visibleTabs.includes('calendar')" :class="view === 'calendar' && 'active'"
                    @click="setView('calendar')">Calendario</button>
                <button x-show="visibleTabs.includes('users')" :class="view === 'users' && 'active'"
                    @click="setView('users')">Gestione Utenti</button>
                <button x-show="visibleTabs.includes('telegram')" :class="view === 'telegram' && 'active'"
                    @click="setView('telegram')">Telegram Bot</button>
                <button x-show="visibleTabs.includes('activity')" :class="view === 'activity' && 'active'"
                    @click="setView('activity')">Attivita'</button>
                <span style="margin-left: auto; display: flex; align-items: center;">
                    <span class="user-info" x-show="currentUser" x-text="currentUser?.username"></span>
                    <button @click="logout" style="color: red;">LOGOUT</button>
                </span>
            </nav>

            <div class="container">

                <!-- MEMBERSHIP -->
                <div x-show="view === 'membership'">
                    <div class="card">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <h3 style="margin:0"
                                x-text="membershipTab === 'requests' ? 'Richieste Iscrizione' : 'Soci Tesserati'"></h3>
                            <button @click="window.open('sheet-associati.html', '_blank')"
                                style="border:1px solid #000; padding:5px 10px;">APRI FOGLIO CALCOLO</button>
                        </div>
                        <table class="activity-table">
                            <thead>
                                <tr>
                                    <th>Socio</th>
                                    <th>Email</th>
                                    <th>Citta</th>
                                    <th>Interessi</th>
                                    <th>Pagamento</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="m in filteredMemberships" :key="m.id">
                                    <tr>
                                        <td @click="editingMembership = m"
                                            style="cursor:pointer; text-decoration:underline;"
                                            x-text="m.surname + ' ' + m.name"></td>
                                        <td x-text="m.email"></td>
                                        <td x-text="m.city"></td>
                                        <td>
                                            <small
                                                x-text="[m.interestHabitat && 'Habitat', m.interestDistrettoA && 'Distretto A', m.interestDawe && 'DAWE', m.interestQuazar && 'Quazar'].filter(Boolean).join(', ')"></small>
                                        </td>
                                        <td x-text="m.paymentMethod"></td>
                                        <td>
                                            <span x-show="canWrite">
                                                <button x-show="membershipTab === 'requests'"
                                                    @click="confirmMembership(m)" class="btn-del"
                                                    style="color:green">V</button>
                                                <button @click="deleteItem(m.id)" class="btn-del">X</button>
                                            </span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <div class="card" x-show="membershipTab === 'confirmed' && deletedMemberships.length > 0">
                        <h3 style="margin:0 0 15px">Cestino <span style="font-weight:normal; font-size:12px;"
                                x-text="'(' + deletedMemberships.length + ')'"></span></h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Socio</th>
                                    <th>Email</th>
                                    <th>Eliminato il</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="m in deletedMemberships" :key="m.id">
                                    <tr>
                                        <td x-text="m.surname + ' ' + m.name"></td>
                                        <td x-text="m.email"></td>
                                        <td x-text="formatDate(m.deletedAt)"></td>
                                        <td>
                                            <button x-show="canWrite" @click="restoreMembership(m)" class="btn-del"
                                                style="color:green" title="Ripristina">&#x21A9;</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>


                <!-- EXPENSES -->
                <div x-show="view === 'expenses'">
                    <div class="card" style="height: 180px;"><canvas id="expenseChart"></canvas></div>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; text-align: center;">
                        <div class="card" style="flex:1"><small>IN</small><br><b x-text="stats.totalIn + '&#x20AC;'"
                                style="color:green"></b></div>
                        <div class="card" style="flex:1"><small>OUT</small><br><b x-text="stats.totalOut + '&#x20AC;'"
                                style="color:red"></b></div>
                        <div class="card" style="flex:1"><small>SALDO</small><br><b
                                x-text="stats.balance + '&#x20AC;'"></b>
                        </div>
                        <button
                            @click="window.open(`sheet-flow.html?filter=${filter}&habitante=${habitanteFilter}&type=${typeFilter}`, '_blank')"
                            class="card">
                            APRI FOGLIO CALCOLO &#x2197;
                        </button>
                    </div>

                    <div class="card">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px;">
                            <div style="display: flex; gap: 5px; align-items: center;">
                                <select x-model="filter" style="width: auto; margin:0">
                                    <option value="all">Tutti i movimenti</option>
                                    <option value="in">Entrate</option>
                                    <option value="out">Uscite</option>
                                </select>

                                <div x-transition>
                                    <select x-model="habitanteFilter" style="width: auto; margin:0">
                                        <option value="all">Tutti i pagatori</option>
                                        <option value="habitat">Habitat (Cassa)</option>
                                        <option value="beppe">Beppe</option>
                                        <option value="chiara">Chiara</option>
                                        <option value="enri">Enri</option>
                                        <option value="marco">Marco</option>
                                        <option value="pongie">Pongie</option>
                                        <option value="poni">Poni</option>
                                    </select>
                                </div>
                                <select x-model="typeFilter" style="width: auto; margin:0">
                                    <option value="all">Tutti i tipi</option>
                                    <option value="tessera">Tessera</option>
                                    <option value="evento">Evento</option>
                                    <option value="bando">Bando</option>
                                    <option value="workshop">Workshop</option>
                                    <option value="donazione">Donazione</option>
                                    <option value="bolletta">Bolletta</option>
                                    <option value="acquisto">Acquisto</option>
                                </select>
                            </div>
                            <button x-show="canWrite" @click="openCreate()"
                                style="padding: 4px 10px; cursor: pointer; background: #000; color:#fff; border:none;">+
                                NUOVA VOCE</button>
                        </div>

                        <table>
                            <thead>
                                <tr>
                                    <th>Titolo</th>
                                    <th>&#x20AC;</th>
                                    <th>Data</th>
                                    <th>Tipo</th>
                                    <th style="background: #fdf2f2;">Pagato da</th>
                                    <th style="background: #fdf2f2;">Modalita</th>
                                    <th style="background: #fdf2f2;">Documento</th>
                                    <th x-show="canWrite"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="item in filteredItems" :key="item.id">
                                    <tr>
                                        <td @click="canWrite && openEdit(item)" x-text="item.title"
                                            :style="canWrite ? 'cursor:pointer; text-decoration:underline;' : ''"></td>
                                        <td x-text="item.amount + '&#x20AC;'"
                                            :style="item.isExit ? 'color:red' : 'color:green'"></td>
                                        <td x-text="formatDate(item.date)"></td>
                                        <td x-text="item.expenseType || '-'"
                                            style="text-transform: capitalize; font-size: 11px;"></td>

                                        <td x-text="item.payerType === 'habitat' ? 'Habitat' : (item.specificHabitante || '-')"
                                            style="text-transform: capitalize; font-size: 11px;"></td>
                                        <td x-text="item.paymentMethod || '-'" style="font-size: 11px; color: #666;">
                                        </td>
                                        <td x-text="item.receiptType === 'nessuno' ? '-' : (item.receiptType || '-')"
                                            style="font-size: 11px;"></td>

                                        <td x-show="canWrite"><button @click="deleteItem(item.id)"
                                                class="btn-del">X</button></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- GUESTS -->
                <div x-show="view === 'guests'">
                    <template x-if="!selectedGuest">
                        <div class="card">
                            <div

                                    </label>
                                </template>
                            </div>
                        </div>
                    </template>
                    <label style="margin-top:10px;">
                        <input type="checkbox" x-model="editingUser.active" style="width:auto"> Attivo
                    </label>
                    <button class="btn-blk" @click="saveUser()">SALVA</button>
                    <button @click="editingUser = null"
                        style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                </div>
            </template>

            <!-- SIDEBAR: Calendar Event -->
            <template x-if="editingCalendarEvent">
                <div class="sidebar">
                    <h3 x-text="editingCalendarEvent.uid ? 'MODIFICA EVENTO' : 'NUOVO EVENTO'"></h3>
                    <label>Titolo</label><input type="text" x-model="editingCalendarEvent.summary">
                    <label style="margin-top:10px;">
                        <input type="checkbox" x-model="editingCalendarEvent.allDay" style="width:auto"> Tutto il giorno
                    </label>
                    <label>Inizio</label>
                    <input :type="editingCalendarEvent.allDay ? 'date' : 'datetime-local'"
                        x-model="editingCalendarEvent.dtstart">
                    <label>Fine</label>
                    <input :type="editingCalendarEvent.allDay ? 'date' : 'datetime-local'"
                        x-model="editingCalendarEvent.dtend">
                    <label>Descrizione</label><textarea x-model="editingCalendarEvent.description" rows="3"></textarea>
                    <label>Luogo</label><input type="text" x-model="editingCalendarEvent.location">
                    <button class="btn-blk" @click="saveCalendarEvent()">SALVA</button>
                    <button x-show="editingCalendarEvent.uid" @click="deleteCalendarEvent(editingCalendarEvent.uid)"
                        class="btn-del" style="width:100%; margin-top:10px; text-align:center;">ELIMINA EVENTO</button>
                    <button @click="editingCalendarEvent = null"
                        style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                </div>
            </template>

            <!-- SIDEBAR: Edit Telegram Chat -->
            <template x-if="editingChat">
                <div class="sidebar">
                    <h3 x-text="editingChat.id ? 'MODIFICA CHAT' : 'NUOVA CHAT'"></h3>
                    <label>Chat ID</label>
                    <input type="text" x-model="editingChat.chatId" :disabled="!!editingChat.id">
                    <label>Nome</label>
                    <input type="text" x-model="editingChat.label">
                    <label style="margin-top:10px;">
                        <input type="checkbox" x-model="editingChat.active" style="width:auto"> Attiva
                    </label>
                    <div class="sub-box" style="margin-top:10px;">
                        <label>Notifiche abilitate</label>
                        <div style="margin-top:5px;">
                            <label style="display:block; font-weight:normal; margin-bottom:5px;">
                                <input type="checkbox" x-model="editingChat.notifyDigest" style="width:auto">
                                Riepilogo giornaliero
                            </label>
                            <label style="display:block; font-weight:normal; margin-bottom:5px;">
                                <input type="checkbox" x-model="editingChat.notifyResidency" style="width:auto">
                                Nuove residenze
                            </label>
                            <label style="display:block; font-weight:normal; margin-bottom:5px;">
                                <input type="checkbox" x-model="editingChat.notifyMembership" style="width:auto">
                                Nuove tessere
                            </label>
                            <label style="display:block; font-weight:normal;">
                                <input type="checkbox" x-model="editingChat.notifyFestival" style="width:auto">
                                Prenotazioni festival
                            </label>
                        </div>
                    </div>
                    <button class="btn-blk" @click="saveChat()">SALVA</button>
                    <button @click="editingChat = null"
                        style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                </div>
            </template>

            <!-- MODAL: Confirm -->
            <template x-if="confirmModal">
                <div class="modal-overlay">
                    <div class="modal-box">
                        <p x-text="confirmModal.message"></p>
                        <button class="btn-blk" style="width:auto"
                            @click="confirmModal.resolve(true); confirmModal = null">CONFERMA</button>
                        <button @click="confirmModal.resolve(false); confirmModal = null"
                            style="border:1px solid #000; padding:8px 20px; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Checkout -->
            <template x-if="checkoutModal">
                <div class="modal-overlay">
                    <div class="modal-box" style="text-align:left; min-width:350px;">
                        <h3 style="margin:0 0 15px; text-align:center;">CHECKOUT - <span
                                x-text="checkoutModal.guestName"></span></h3>

                        <div style="font-size:13px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <span>Soggiorno:</span>
                                <b x-text="'€' + (checkoutModal.invoice.stayAmount || 0).toFixed(2)"></b>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <span>Vitto:</span>
                                <b x-text="'€' + (checkoutModal.invoice.foodAmount || 0).toFixed(2)"></b>
                            </div>
                            <div
                                style="border-top:1px solid #000; margin-top:8px; padding-top:8px; display:flex; justify-content:space-between; align-items:center;">
                                <strong>TOTALE:</strong>
                                <div style="display:flex; align-items:center; gap:4px;">
                                    <span>€</span>
                                    <input type="number" step="0.01" min="0" x-model.number="checkoutModal.customAmount"
                                        style="width:90px; font-weight:bold; font-size:14px; text-align:right; border:1px solid #ccc; padding:4px 6px;">
                                </div>
                            </div>
                            <template x-if="checkoutModal.customAmount != checkoutModal.invoice.totalAmount">
                                <div style="margin-top:6px; font-size:11px; color:#888; text-align:right;">
                                    Importo originale: €<span
                                        x-text="(checkoutModal.invoice.totalAmount || 0).toFixed(2)"></span>
                                </div>
                            </template>
                        </div>

                        <label style="margin-top:15px;">Metodo di pagamento</label>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <button @click="checkoutModal.paymentMethod = 'iban'"
                                :style="checkoutModal.paymentMethod === 'iban' ? 'background:#000; color:#fff; padding:6px 12px; border:1px solid #000;' : 'padding:6px 12px; border:1px solid #000;'">IBAN</button>
                            <button @click="checkoutModal.paymentMethod = 'card'"
                                :style="checkoutModal.paymentMethod === 'card' ? 'background:#000; color:#fff; padding:6px 12px; border:1px solid #000;' : 'padding:6px 12px; border:1px solid #000;'">CARD</button>
                            <button @click="checkoutModal.paymentMethod = 'paypal'"
                                :style="checkoutModal.paymentMethod === 'paypal' ? 'background:#000; color:#fff; padding:6px 12px; border:1px solid #000;' : 'padding:6px 12px; border:1px solid #000;'">PAYPAL</button>
                            <button @click="checkoutModal.paymentMethod = 'cash'"
                                :style="checkoutModal.paymentMethod === 'cash' ? 'background:#000; color:#fff; padding:6px 12px; border:1px solid #000;' : 'padding:6px 12px; border:1px solid #000;'">CASH</button>
                        </div>

                        <button class="btn-blk" style="margin-top:15px;" @click="confirmCheckout()">CONFERMA
                            PAGAMENTO</button>
                        <button @click="checkoutModal = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Residency Approval -->
            <template x-if="residencyApproval">
                <div class="modal-overlay">
                    <div class="modal-box" style="text-align:left; min-width:400px;">
                        <h3 style="margin:0 0 10px">Conferma Residenza</h3>
                        <p style="margin:0 0 15px;">
                            <b x-text="residencyApproval.residency.name"></b> &mdash;
                            <span x-text="formatDate(residencyApproval.residency.fromDate)"></span> &rarr;
                            <span x-text="formatDate(residencyApproval.residency.toDate)"></span>
                        </p>

                        <label>Stanza</label>
                        <select x-model="residencyApproval.room">
                            <option value="">Scegli...</option>
                            <template x-for="opt in residencyApproval.roomOptions" :key="opt.name">
                                <option :value="opt.name" :disabled="!opt.available" x-text="opt.label"></option>
                            </template>
                        </select>

                        <label>Oggetto Email</label>
                        <input type="text" x-model="residencyApproval.emailSubject">

                        <label>Corpo Email</label>
                        <textarea x-model="residencyApproval.emailBody" rows="6"></textarea>

                        <button class="btn-blk" @click="confirmResidency()" :disabled="!residencyApproval.room">CONFERMA
                            E INVIA</button>
                        <button @click="residencyApproval = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Proposal Read -->
            <template x-if="proposalModal">
                <div class="modal-overlay" @click.self="proposalModal = null">
                    <div class="modal-box"
                        style="text-align:left; min-width:400px; max-width:600px; max-height:80vh; overflow-y:auto;">
                        <h3 style="margin:0 0 5px" x-text="proposalModal.name"></h3>
                        <p style="margin:0 0 15px; font-size:12px; color:#666;">
                            <span x-text="formatDate(proposalModal.fromDate)"></span> &rarr;
                            <span x-text="formatDate(proposalModal.toDate)"></span>
                        </p>
                        <div style="white-space:pre-wrap; font-size:13px; line-height:1.5;"
                            x-text="proposalModal.proposal"></div>
                        <button @click="proposalModal = null"
                            style="width:100%; margin-top:15px; border:1px solid #000; padding:8px 20px; cursor:pointer;">Chiudi</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Festival Approval -->
            <template x-if="festivalApproval">
                <div class="modal-overlay">
                    <div class="modal-box" style="text-align:left; min-width:400px;">
                        <h3 style="margin:0 0 10px">Conferma Biglietto Festival</h3>
                        <p style="margin:0 0 15px;">
                            <b x-text="festivalApproval.ticket.name + ' ' + festivalApproval.ticket.surname"></b>
                            &mdash;
                            <span x-text="festivalApproval.ticket.email"></span>
                        </p>

                        <label>Oggetto Email</label>
                        <input type="text" x-model="festivalApproval.emailSubject">

                        <label>Corpo Email</label>
                        <textarea x-model="festivalApproval.emailBody" rows="6"></textarea>

                        <button class="btn-blk" @click="confirmFestivalApproval()">CONFERMA E INVIA</button>
                        <button @click="festivalApproval = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Act Edit -->
            <template x-if="editingAct">
                <div class="modal-overlay" @click.self="editingAct = null">
                    <div class="modal-box" style="text-align:left; min-width:420px;">
                        <h3 style="margin:0 0 10px">Atto Festival</h3>

                        <label>Titolo</label>
                        <input type="text" x-model="editingAct.title">

                        <label>Descrizione</label>
                        <textarea x-model="editingAct.description" rows="3"></textarea>

                        <div style="display:flex; gap:10px;">
                            <div style="flex:1;">
                                <label>Stato</label>
                                <select x-model="editingAct.status">
                                    <option value="draft">Draft</option>
                                    <option value="tentative">Tentative</option>
                                    <option value="confirmed">Confirmed</option>
                                    <option value="cancelled">Cancelled</option>
                                </select>
                            </div>
                            <div style="flex:1;">
                                <label>Categoria</label>
                                <select x-model="editingAct.category">
                                    <option value="talk">Talk</option>
                                    <option value="djset">DJ Set</option>
                                    <option value="walk">Walk</option>
                                    <option value="performance">Performance</option>
                                    <option value="workshop">Workshop</option>
                                    <option value="concert">Concerto</option>
                                    <option value="other">Altro</option>
                                </select>
                            </div>
                        </div>

                        <label>Venue</label>
                        <select x-model.number="editingAct.venueId">
                            <option value="">Nessuna</option>
                            <template x-for="v in plannerVenues" :key="v.id">
                                <option :value="v.id" x-text="v.name"></option>
                            </template>
                        </select>

                        <label>Giorno</label>
                        <select x-model="editingAct.day">
                            <template x-for="d in plannerDays" :key="d.value">
                                <option :value="d.value" x-text="d.label"></option>
                            </template>
                        </select>

                        <div style="display:flex; gap:10px;">
                            <div style="flex:1;">
                                <label>Inizio</label>
                                <input type="time" x-model="editingAct.startTime">
                            </div>
                            <div style="flex:1;">
                                <label>Fine</label>
                                <input type="time" x-model="editingAct.endTime">
                            </div>
                        </div>

                        <label>Prezzo</label>
                        <input type="number" step="0.01" x-model="editingAct.price">

                        <button class="btn-blk" @click="saveAct()">SALVA</button>
                        <button x-show="editingAct.id" @click="deleteAct(editingAct.id)"
                            style="width:100%; margin-top:8px; border:1px solid #000; background:none; cursor:pointer;">ELIMINA</button>
                        <button @click="editingAct = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Venue Edit -->
            <template x-if="editingVenue">
                <div class="modal-overlay" @click.self="editingVenue = null">
                    <div class="modal-box" style="text-align:left; min-width:360px;">
                        <h3 style="margin:0 0 10px">Venue</h3>

                        <label>Nome</label>
                        <input type="text" x-model="editingVenue.name">

                        <label>Ordine</label>
                        <input type="number" x-model.number="editingVenue.sortOrder">

                        <button class="btn-blk" @click="saveVenue()">SALVA</button>
                        <button @click="editingVenue = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Volunteer Edit -->
            <template x-if="editingVolunteer">
                <div class="modal-overlay" @click.self="editingVolunteer = null">
                    <div class="modal-box" style="text-align:left; min-width:420px;">
                        <h3 style="margin:0 0 10px">Volontario</h3>

                        <label>Nome</label>
                        <input type="text" x-model="editingVolunteer.name">

                        <label>Email</label>
                        <input type="text" x-model="editingVolunteer.email">

                        <label>Ruolo</label>
                        <input type="text" x-model="editingVolunteer.role">

                        <label>Disponibilità</label>
                        <input type="text" x-model="editingVolunteer.availability">

                        <label>Compiti (separati da virgola)</label>
                        <input type="text" x-model="editingVolunteer.tasksText">

                        <label>Note</label>
                        <textarea x-model="editingVolunteer.notes" rows="3"></textarea>

                        <button class="btn-blk" @click="saveVolunteer()">SALVA</button>
                        <button x-show="editingVolunteer.id" @click="deleteVolunteer(editingVolunteer.id)"
                            style="width:100%; margin-top:8px; border:1px solid #000; background:none; cursor:pointer;">ELIMINA</button>
                        <button @click="editingVolunteer = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Timeline Deadline -->
            <template x-if="editingDeadline">
                <div class="modal-overlay" @click.self="editingDeadline = null">
                    <div class="modal-box" style="text-align:left; min-width:360px;">
                        <h3 style="margin:0 0 10px">Scadenza</h3>

                        <label>Titolo</label>
                        <input type="text" x-model="editingDeadline.title">

                        <label>Data</label>
                        <input type="date" x-model="editingDeadline.date">

                        <label>Note</label>
                        <textarea x-model="editingDeadline.notes" rows="3"></textarea>

                        <button class="btn-blk" @click="saveDeadline()">SALVA</button>
                        <button x-show="editingDeadline.id" @click="deleteDeadline(editingDeadline.id)"
                            style="width:100%; margin-top:8px; border:1px solid #000; background:none; cursor:pointer;">ELIMINA</button>
                        <button @click="editingDeadline = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Residency Rejection -->
            <template x-if="residencyRejection">
                <div class="modal-overlay">
                    <div class="modal-box" style="text-align:left; min-width:400px;">
                        <h3 style="margin:0 0 10px">Rifiuta Residenza</h3>
                        <p style="margin:0 0 15px;">
                            <b x-text="residencyRejection.residency.name"></b> &mdash;
                            <span x-text="formatDate(residencyRejection.residency.fromDate)"></span> &rarr;
                            <span x-text="formatDate(residencyRejection.residency.toDate)"></span>
                        </p>

                        <label>Oggetto Email</label>
                        <input type="text" x-model="residencyRejection.emailSubject">

                        <label>Corpo Email</label>
                        <textarea x-model="residencyRejection.emailBody" rows="6"></textarea>

                        <button class="btn-blk" @click="confirmRejection()">RIFIUTA E INVIA</button>
                        <button @click="residencyRejection = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

        </main>
    </template>
    <script src="../config.js"></script>
    <script src="app.js"></script>
</body>

</html>
