<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: courier;
            margin: 0;
            background: #fff;
            color: #000;
            font-size: 14px;
        }

        .container {
            padding: 20px;
            max-width: 1100px;
            margin: auto;
        }

        nav {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #000;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 10;
        }

        button {
            font-family: inherit !important;
            background: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
        }

        button:hover {
            text-decoration: underline;
        }

        nav button.active {
            text-decoration: underline;
        }

        .card {
            border: 1px solid #000;
            padding: 15px;
            margin-bottom: 20px;
        }

        .logincard {
            border: 1px solid #000;
            padding: 15px;
            margin-bottom: 20px;
            width: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        table td {
            white-space: nowrap;
        }

        th {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        .sidebar {
            position: absolute;
            top: 0;
            right: 0;
            width: 350px;
            height: 100%;
            background: #fff;
            border-left: 1px solid #000;
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.05);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 6px;
            margin: 4px 0 12px;
            border: 1px solid #000;
            font-family: inherit;
            font-size: 13px;
        }

        label {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            display: block;
        }

        .btn-blk {
            background: #000;
            color: #fff;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .btn-del {
            color: red;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
        }

        .in-casa {
            color: #2c7a7b;
            font-weight: bold;
            font-size: 11px;
        }

        .sub-box {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #f9f9f9;
        }

        .create {
            margin-bottom: 15px;
            background: #000;
            color: #fff;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
        }

        .alert-red {
            background-color: rgba(255, 0, 0, 0.1) !important;
        }

        .status-tag {
            font-size: 9px;
            padding: 2px 4px;
            border: 1px solid currentColor;
            margin-left: 10px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-box {
            background: #fff;
            border: 1px solid #000;
            padding: 20px 25px;
            min-width: 280px;
            text-align: center;
        }

        .modal-box p {
            margin: 0 0 15px;
        }

        .modal-box button {
            margin: 0 5px;
            padding: 8px 20px;
        }

        .role-badge {
            font-size: 9px;
            padding: 2px 6px;
            border: 1px solid currentColor;
            text-transform: uppercase;
        }

        .role-admin { color: #c53030; }
        .role-reader { color: #2b6cb0; }
        .role-reader_limited { color: #b7791f; }

        .tab-chip {
            display: inline-block;
            font-size: 10px;
            padding: 1px 5px;
            border: 1px solid #ccc;
            margin: 1px;
        }

        .user-info {
            font-size: 11px;
            color: #666;
            margin-right: 10px;
        }

        /* FullCalendar overrides */
        .fc {
            font-family: courier, monospace;
            font-size: 13px;
        }
        .fc .fc-toolbar-title {
            font-size: 16px;
            text-transform: uppercase;
        }
        .fc .fc-button {
            font-family: courier, monospace;
            font-size: 11px;
            text-transform: uppercase;
            background: #000;
            border-color: #000;
        }
        .fc .fc-button:hover {
            background: #333;
            border-color: #333;
        }
        .fc .fc-button-active {
            background: #333 !important;
            border-color: #333 !important;
        }
        .fc .fc-daygrid-event {
            font-size: 11px;
        }
    </style>
</head>

<body x-data="app" x-cloak>

    <template x-if="!token">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center;">
            <div class="logincard" @keydown.enter="login">
                <img src="https://habitattt.it/images/h.logo.png" alt="Habitat"
                    style="height: 40px; margin-bottom: 15px;">
                <label>Username</label><input type="text" x-model="loginData.username">
                <label>Password</label><input type="password" x-model="loginData.password">
                <button class="btn-blk" @click="login">ENTRA</button>
            </div>
        </div>
    </template>

    <template x-if="token">
        <main>
            <nav>
                <img src="https://habitattt.it/images/h.logo.png" alt="Habitat"
                    style="height: 28px; margin-right: 10px;">
                <button x-show="visibleTabs.includes('expenses')" :class="view === 'expenses' && 'active'" @click="setView('expenses')">Flow Cassa</button>
                <button x-show="visibleTabs.includes('guests')" :class="view === 'guests' && 'active'" @click="setView('guests')">Ospitalita'</button>
                <button x-show="visibleTabs.includes('bookings')" :class="view === 'bookings' && 'active'" @click="setView('bookings')">Prenotazioni</button>
                <button x-show="visibleTabs.includes('residency')" :class="view === 'residency' && 'active'" @click="setView('residency')">Residenze <span x-show="residencyCount > 0" x-text="'(' + residencyCount + ')'"></span></button>
                <button x-show="visibleTabs.includes('membership')" :class="view === 'membership' && membershipTab === 'requests' && 'active'"
                    @click="membershipTab = 'requests'; setView('membership')">Richiesta Tessere <span x-show="membershipRequestCount > 0" x-text="'(' + membershipRequestCount + ')'"></span></button>
                <button x-show="visibleTabs.includes('membership')" :class="view === 'membership' && membershipTab === 'confirmed' && 'active'"
                    @click="membershipTab = 'confirmed'; setView('membership')">Tesserati <span x-show="membershipConfirmedCount > 0" x-text="'(' + membershipConfirmedCount + ')'"></span></button>
                <button x-show="visibleTabs.includes('calendar')" :class="view === 'calendar' && 'active'" @click="setView('calendar')">Calendario</button>
                <button x-show="visibleTabs.includes('users')" :class="view === 'users' && 'active'" @click="setView('users')">Gestione Utenti</button>
                <button x-show="visibleTabs.includes('telegram')" :class="view === 'telegram' && 'active'" @click="setView('telegram')">Telegram Bot</button>
                <span style="margin-left: auto; display: flex; align-items: center;">
                    <span class="user-info" x-show="currentUser" x-text="currentUser?.username"></span>
                    <button @click="logout" style="color: red;">LOGOUT</button>
                </span>
            </nav>

            <div class="container">

                <!-- MEMBERSHIP -->
                <div x-show="view === 'membership'">
                    <div class="card">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <h3 style="margin:0"
                                x-text="membershipTab === 'requests' ? 'Richieste Iscrizione' : 'Soci Tesserati'"></h3>
                            <button @click="window.open('sheet-associati.html', '_blank')"
                                style="border:1px solid #000; padding:5px 10px;">APRI FOGLIO CALCOLO</button>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Socio</th>
                                    <th>Email</th>
                                    <th>Citta</th>
                                    <th>Interessi</th>
                                    <th>Pagamento</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="m in filteredMemberships" :key="m.id">
                                    <tr>
                                        <td @click="editingMembership = m"
                                            style="cursor:pointer; text-decoration:underline;"
                                            x-text="m.surname + ' ' + m.name"></td>
                                        <td x-text="m.email"></td>
                                        <td x-text="m.city"></td>
                                        <td>
                                            <small
                                                x-text="[m.interestHabitat && 'Habitat', m.interestDistrettoA && 'Distretto A', m.interestDawe && 'DAWE', m.interestQuazar && 'Quazar'].filter(Boolean).join(', ')"></small>
                                        </td>
                                        <td x-text="m.paymentMethod"></td>
                                        <td>
                                            <span x-show="canWrite">
                                                <button x-show="membershipTab === 'requests'" @click="confirmMembership(m)"
                                                    class="btn-del" style="color:green">V</button>
                                                <button @click="deleteItem(m.id)" class="btn-del">X</button>
                                            </span>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <div class="card" x-show="membershipTab === 'confirmed' && deletedMemberships.length > 0">
                        <h3 style="margin:0 0 15px">Cestino <span style="font-weight:normal; font-size:12px;" x-text="'(' + deletedMemberships.length + ')'"></span></h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Socio</th>
                                    <th>Email</th>
                                    <th>Eliminato il</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="m in deletedMemberships" :key="m.id">
                                    <tr>
                                        <td x-text="m.surname + ' ' + m.name"></td>
                                        <td x-text="m.email"></td>
                                        <td x-text="formatDate(m.deletedAt)"></td>
                                        <td>
                                            <button x-show="canWrite" @click="restoreMembership(m)" class="btn-del" style="color:green" title="Ripristina">&#x21A9;</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>


                <!-- EXPENSES -->
                <div x-show="view === 'expenses'">
                    <div class="card" style="height: 180px;"><canvas id="expenseChart"></canvas></div>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px; text-align: center;">
                        <div class="card" style="flex:1"><small>IN</small><br><b x-text="stats.totalIn + '&#x20AC;'"
                                style="color:green"></b></div>
                        <div class="card" style="flex:1"><small>OUT</small><br><b x-text="stats.totalOut + '&#x20AC;'"
                                style="color:red"></b></div>
                        <div class="card" style="flex:1"><small>SALDO</small><br><b x-text="stats.balance + '&#x20AC;'"></b>
                        </div>
                        <button
                            @click="window.open(`sheet-flow.html?filter=${filter}&habitante=${habitanteFilter}&type=${typeFilter}`, '_blank')"
                            class="card">
                            APRI FOGLIO CALCOLO &#x2197;
                        </button>
                    </div>

                    <div class="card">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px;">
                            <div style="display: flex; gap: 5px; align-items: center;">
                                <select x-model="filter" style="width: auto; margin:0">
                                    <option value="all">Tutti i movimenti</option>
                                    <option value="in">Entrate</option>
                                    <option value="out">Uscite</option>
                                </select>

                                <div x-transition>
                                    <select x-model="habitanteFilter" style="width: auto; margin:0">
                                        <option value="all">Tutti i pagatori</option>
                                        <option value="habitat">Habitat (Cassa)</option>
                                        <option value="beppe">Beppe</option>
                                        <option value="chiara">Chiara</option>
                                        <option value="enri">Enri</option>
                                        <option value="marco">Marco</option>
                                        <option value="pongie">Pongie</option>
                                        <option value="poni">Poni</option>
                                    </select>
                                </div>
                                <select x-model="typeFilter" style="width: auto; margin:0">
                                    <option value="all">Tutti i tipi</option>
                                    <option value="tessera">Tessera</option>
                                    <option value="evento">Evento</option>
                                    <option value="bando">Bando</option>
                                    <option value="workshop">Workshop</option>
                                    <option value="donazione">Donazione</option>
                                    <option value="bolletta">Bolletta</option>
                                    <option value="acquisto">Acquisto</option>
                                </select>
                            </div>
                            <button x-show="canWrite" @click="openCreate()"
                                style="padding: 4px 10px; cursor: pointer; background: #000; color:#fff; border:none;">+
                                NUOVA VOCE</button>
                        </div>

                        <table>
                            <thead>
                                <tr>
                                    <th>Titolo</th>
                                    <th>&#x20AC;</th>
                                    <th>Data</th>
                                    <th>Tipo</th>
                                    <th style="background: #fdf2f2;">Pagato da</th>
                                    <th style="background: #fdf2f2;">Modalita</th>
                                    <th style="background: #fdf2f2;">Documento</th>
                                    <th x-show="canWrite"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="item in filteredItems" :key="item.id">
                                    <tr>
                                        <td @click="canWrite && openEdit(item)" x-text="item.title"
                                            :style="canWrite ? 'cursor:pointer; text-decoration:underline;' : ''"></td>
                                        <td x-text="item.amount + '&#x20AC;'"
                                            :style="item.isExit ? 'color:red' : 'color:green'"></td>
                                        <td x-text="formatDate(item.date)"></td>
                                        <td x-text="item.expenseType || '-'"
                                            style="text-transform: capitalize; font-size: 11px;"></td>

                                        <td x-text="item.payerType === 'habitat' ? 'Habitat' : (item.specificHabitante || '-')"
                                            style="text-transform: capitalize; font-size: 11px;"></td>
                                        <td x-text="item.paymentMethod || '-'" style="font-size: 11px; color: #666;"></td>
                                        <td x-text="item.receiptType === 'nessuno' ? '-' : (item.receiptType || '-')"
                                            style="font-size: 11px;"></td>

                                        <td x-show="canWrite"><button @click="deleteItem(item.id)" class="btn-del">X</button></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- GUESTS -->
                <div x-show="view === 'guests'">
                    <template x-if="!selectedGuest">
                        <div class="card">
                            <div
                                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <button x-show="canWrite" @click="openCreateGuest()" class="create">+ NUOVO OSPITE</button>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Ospite</th>
                                        <th>Stato</th>
                                        <th>In casa?</th>
                                        <th x-show="canWrite"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="g in items" :key="g.id">
                                        <tr :class="!g.isConfirmed && 'alert-red'">
                                            <td @click="selectGuest(g)" x-text="g.name"
                                                style="cursor:pointer; text-decoration:underline;"></td>
                                            <td>
                                                <span x-show="!g.isConfirmed" class="status-tag"
                                                    style="color:red; border-color:red;">DA CONFERMARE</span>
                                                <span x-show="g.isConfirmed" class="status-tag"
                                                    style="color:green; border-color:green;">OK</span>
                                            </td>
                                            <td><span class="in-casa" x-show="isGuestPresent(g.id)">in casa.</span>
                                            </td>
                                            <td x-show="canWrite"><button @click="deleteItem(g.id)" class="btn-del">X</button></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>

                    <template x-if="selectedGuest">
                        <div>
                            <button @click="selectedGuest = null" style="margin-bottom:10px; cursor:pointer;">&#x2190;
                                LISTA</button>
                            <div class="card">
                                <div style="display:flex; justify-content: space-between;">
                                    <h2 x-text="selectedGuest.name" style="margin:0"></h2>
                                    <button x-show="canWrite" @click="editingGuest = {...selectedGuest}" style="cursor:pointer;">MODIFICA
                                        SCHEDA</button>
                                </div>
                                <p><small>EMAIL:</small> <span x-text="selectedGuest.email || '-'"></span></p>
                                <p><small>TEL:</small> <span x-text="selectedGuest.phone || '-'"></span></p>
                                <p><small>STATO:</small> <b
                                        x-text="selectedGuest.isConfirmed ? 'CONFERMATO' : 'DA CONFERMARE'"></b></p>
                                <hr>
                                <h3>STORICO SOGGIORNI</h3>
                                <table>
                                    <thead>
                                        <tr>
                                            <th>Dal</th>
                                            <th>Al</th>
                                            <th>Stanza</th>
                                            <th>Stato</th>
                                            <th>Ospite</th>
                                            <th x-show="canWrite">Azioni</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="b in guestHistory" :key="b.id">
                                            <tr :class="b.room === 'da assegnare' && 'alert-red'">
                                                <td x-text="formatDate(b.checkIn)"></td>
                                                <td x-text="formatDate(b.checkOut)"></td>
                                                <td x-text="b.room"></td>
                                                <td x-text="getBookingStatus(b)"></td>
                                                <td>
                                                    <span class="status-tag"
                                                        :style="'color:' + getGuestStatusColor(b.guestStatus) + '; border-color:' + getGuestStatusColor(b.guestStatus)"
                                                        x-text="getGuestStatusLabel(b.guestStatus)"></span>
                                                </td>
                                                <td x-show="canWrite">
                                                    <template x-if="b.guestStatus === 'standby' && b.status !== 'cancelled'">
                                                        <button @click="checkinGuest(b.id)"
                                                            style="background:#2c7a7b; color:#fff; padding:3px 8px; font-size:11px; cursor:pointer;">CHECK-IN</button>
                                                    </template>
                                                    <template x-if="b.guestStatus === 'in_progress'">
                                                        <span>
                                                            <button @click="openCheckout(b.id)"
                                                                style="background:#000; color:#fff; padding:3px 8px; font-size:11px; cursor:pointer;">CHECKOUT</button>
                                                            <span x-show="b.invoice" style="font-size:11px; margin-left:5px;"
                                                                x-text="'€' + (b.invoice?.totalAmount || 0).toFixed(2)"></span>
                                                        </span>
                                                    </template>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>

                                <!-- Invoice summary for active/completed bookings -->
                                <template x-for="b in guestHistory.filter(b => b.guestStatus === 'in_progress' || b.guestStatus === 'checkout')" :key="'inv-' + b.id">
                                    <div class="sub-box" style="margin-top:10px;">
                                        <strong x-text="'Fattura — ' + formatDate(b.checkIn) + ' → ' + formatDate(b.checkOut)"></strong>
                                        <div style="margin-top:8px; font-size:13px;">
                                            <div>Soggiorno: <b x-text="'€' + (b.invoice?.stayAmount || 0).toFixed(2)"></b></div>
                                            <div>Vitto: <b x-text="'€' + (b.invoice?.foodAmount || 0).toFixed(2)"></b></div>
                                            <div style="border-top:1px solid #ccc; margin-top:5px; padding-top:5px;">
                                                <strong x-text="'TOTALE: €' + (b.invoice?.totalAmount || 0).toFixed(2)"></strong>
                                            </div>
                                            <template x-if="b.invoice?.isPaid">
                                                <div style="margin-top:5px;">
                                                    <span class="status-tag" style="color:green; border-color:green;">PAGATO</span>
                                                    <span style="font-size:11px; margin-left:5px;"
                                                        x-text="(b.invoice.paymentMethod || '').toUpperCase() + ' — ' + formatDate(b.invoice.paidAt)"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                </div>

                <!-- BOOKINGS -->
                <div x-show="view === 'bookings'">
                    <div class="card">
                        <button x-show="canWrite" @click="openCreateBooking()" class="create">+ NUOVA PRENOTAZIONE</button>
                        <table>
                            <thead>
                                <tr>
                                    <th>Ospite</th>
                                    <th>Stanza</th>
                                    <th>Da</th>
                                    <th>A</th>
                                    <th>Stato Ospite</th>
                                    <th x-show="canWrite">Azioni</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="b in items" :key="b.id">
                                    <tr :class="(b.room === 'da assegnare' || (!b.hasMembership && b.guestStatus === 'standby')) && 'alert-red'">
                                        <td @click="canWrite && openEditBooking(b)"
                                            :style="canWrite ? 'cursor:pointer; text-decoration:underline;' : ''">
                                            <span x-text="b.guest?.name || b.guest || 'N/A'"></span>
                                            <span x-show="!b.hasMembership && b.guestStatus === 'standby'"
                                                  title="Tessera associativa mancante"
                                                  style="color:red; margin-left:4px; cursor:help;">&#9888;</span>
                                        </td>
                                        <td x-text="b.room"></td>
                                        <td x-text="formatDate(b.checkIn)"></td>
                                        <td x-text="formatDate(b.checkOut)"></td>
                                        <td>
                                            <span class="status-tag"
                                                :style="'color:' + getGuestStatusColor(b.guestStatus) + '; border-color:' + getGuestStatusColor(b.guestStatus)"
                                                x-text="getGuestStatusLabel(b.guestStatus)"></span>
                                        </td>
                                        <td x-show="canWrite">
                                            <template x-if="b.guestStatus === 'standby' && b.status !== 'cancelled'">
                                                <button @click="b.hasMembership && checkinGuest(b.id)"
                                                    :disabled="!b.hasMembership"
                                                    :style="!b.hasMembership
                                                        ? 'background:#ccc; color:#666; padding:3px 8px; font-size:11px; cursor:not-allowed;'
                                                        : 'background:#2c7a7b; color:#fff; padding:3px 8px; font-size:11px; cursor:pointer;'">CHECK-IN</button>
                                            </template>
                                            <template x-if="b.guestStatus === 'in_progress'">
                                                <button @click="openCheckout(b.id)"
                                                    style="background:#000; color:#fff; padding:3px 8px; font-size:11px; cursor:pointer;">CHECKOUT</button>
                                            </template>

                        <div style="font-size:13px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <span>Soggiorno:</span>
                                <b x-text="'€' + (checkoutModal.invoice.stayAmount || 0).toFixed(2)"></b>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <span>Vitto:</span>
                                <b x-text="'€' + (checkoutModal.invoice.foodAmount || 0).toFixed(2)"></b>
                            </div>
                            <div style="border-top:1px solid #000; margin-top:8px; padding-top:8px; display:flex; justify-content:space-between; align-items:center;">
                                <strong>TOTALE:</strong>
                                <div style="display:flex; align-items:center; gap:4px;">
                                    <span>€</span>
                                    <input type="number" step="0.01" min="0"
                                        x-model.number="checkoutModal.customAmount"
                                        style="width:90px; font-weight:bold; font-size:14px; text-align:right; border:1px solid #ccc; padding:4px 6px;">
                                </div>
                            </div>
                            <template x-if="checkoutModal.customAmount != checkoutModal.invoice.totalAmount">
                                <div style="margin-top:6px; font-size:11px; color:#888; text-align:right;">
                                    Importo originale: €<span x-text="(checkoutModal.invoice.totalAmount || 0).toFixed(2)"></span>
                                </div>
                            </template>
                        </div>

                        <label style="margin-top:15px;">Metodo di pagamento</label>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <button @click="checkoutModal.paymentMethod = 'iban'"
                                :style="checkoutModal.paymentMethod === 'iban' ? 'background:#000; color:#fff; padding:6px 12px; border:1px solid #000;' : 'padding:6px 12px; border:1px solid #000;'">IBAN</button>
                            <button @click="checkoutModal.paymentMethod = 'card'"
                                :style="checkoutModal.paymentMethod === 'card' ? 'background:#000; color:#fff; padding:6px 12px; border:1px solid #000;' : 'padding:6px 12px; border:1px solid #000;'">CARD</button>
                            <button @click="checkoutModal.paymentMethod = 'paypal'"
                                :style="checkoutModal.paymentMethod === 'paypal' ? 'background:#000; color:#fff; padding:6px 12px; border:1px solid #000;' : 'padding:6px 12px; border:1px solid #000;'">PAYPAL</button>
                            <button @click="checkoutModal.paymentMethod = 'cash'"
                                :style="checkoutModal.paymentMethod === 'cash' ? 'background:#000; color:#fff; padding:6px 12px; border:1px solid #000;' : 'padding:6px 12px; border:1px solid #000;'">CASH</button>
                        </div>

                        <button class="btn-blk" style="margin-top:15px;" @click="confirmCheckout()">CONFERMA PAGAMENTO</button>
                        <button @click="checkoutModal = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Residency Approval -->
            <template x-if="residencyApproval">
                <div class="modal-overlay">
                    <div class="modal-box" style="text-align:left; min-width:400px;">
                        <h3 style="margin:0 0 10px">Conferma Residenza</h3>
                        <p style="margin:0 0 15px;">
                            <b x-text="residencyApproval.residency.name"></b> &mdash;
                            <span x-text="formatDate(residencyApproval.residency.fromDate)"></span> &rarr;
                            <span x-text="formatDate(residencyApproval.residency.toDate)"></span>
                        </p>

                        <label>Stanza</label>
                        <select x-model="residencyApproval.room">
                            <option value="">Scegli...</option>
                            <template x-for="room in residencyApproval.availableRooms" :key="room">
                                <option :value="room" x-text="room"></option>
                            </template>
                        </select>

                        <label>Oggetto Email</label>
                        <input type="text" x-model="residencyApproval.emailSubject">

                        <label>Corpo Email</label>
                        <textarea x-model="residencyApproval.emailBody" rows="6"></textarea>

                        <button class="btn-blk" @click="confirmResidency()"
                            :disabled="!residencyApproval.room">CONFERMA E INVIA</button>
                        <button @click="residencyApproval = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Proposal Read -->
            <template x-if="proposalModal">
                <div class="modal-overlay" @click.self="proposalModal = null">
                    <div class="modal-box" style="text-align:left; min-width:400px; max-width:600px; max-height:80vh; overflow-y:auto;">
                        <h3 style="margin:0 0 5px" x-text="proposalModal.name"></h3>
                        <p style="margin:0 0 15px; font-size:12px; color:#666;">
                            <span x-text="formatDate(proposalModal.fromDate)"></span> &rarr;
                            <span x-text="formatDate(proposalModal.toDate)"></span>
                        </p>
                        <div style="white-space:pre-wrap; font-size:13px; line-height:1.5;" x-text="proposalModal.proposal"></div>
                        <button @click="proposalModal = null"
                            style="width:100%; margin-top:15px; border:1px solid #000; padding:8px 20px; cursor:pointer;">Chiudi</button>
                    </div>
                </div>
            </template>

            <!-- MODAL: Residency Rejection -->
            <template x-if="residencyRejection">
                <div class="modal-overlay">
                    <div class="modal-box" style="text-align:left; min-width:400px;">
                        <h3 style="margin:0 0 10px">Rifiuta Residenza</h3>
                        <p style="margin:0 0 15px;">
                            <b x-text="residencyRejection.residency.name"></b> &mdash;
                            <span x-text="formatDate(residencyRejection.residency.fromDate)"></span> &rarr;
                            <span x-text="formatDate(residencyRejection.residency.toDate)"></span>
                        </p>

                        <label>Oggetto Email</label>
                        <input type="text" x-model="residencyRejection.emailSubject">

                        <label>Corpo Email</label>
                        <textarea x-model="residencyRejection.emailBody" rows="6"></textarea>

                        <button class="btn-blk" @click="confirmRejection()">RIFIUTA E INVIA</button>
                        <button @click="residencyRejection = null"
                            style="width:100%; margin-top:10px; border:none; background:none; cursor:pointer;">Annulla</button>
                    </div>
                </div>
            </template>

        </main>
    </template>
    <script src="../config.js"></script>
    <script src="app.js"></script>
</body>

</html>
